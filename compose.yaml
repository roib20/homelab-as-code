---
# Run with: `mkdir -p "${HOME}/.kube" "${HOME}/.talos" && docker compose run --user "$(id -u):$(id -g)" --rm runner`
services:
  runner:
    image: homelab-as-code-runner:latest
    pull_policy: never
    container_name: homelab-as-code-runner
    # Network mode "host" is needed to access IPs on the local network, including the Tailnet
    network_mode: host
    volumes:
      # Mount the locally cloned "homelab-as-code" repository, in order to be able to run IaC
      - "../homelab-as-code:/homelab-as-code:rw"
      # Mount kube and talos config files, in order to update context for the local user
      # Make sure the directories exist on the host: `mkdir "${HOME}/.kube" "${HOME}/.talos"`
      - "${HOME}/.kube:/home/runner/.kube:rw"
      - "${HOME}/.talos:/home/runner/.talos:rw"
    # Used for file ownership for files created inside the container
    user: "${UID:-1000}:${GID:-1000}"
    command: ["/bin/bash"]
    environment:
      - BWS_ACCESS_TOKEN=${BWS_ACCESS_TOKEN}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
  task-ui:
    image: homelab-as-code-runner:latest
    pull_policy: missing
    container_name: homelab-as-code-task-ui
    # Network mode "host" is needed to access IPs on the local network, including the Tailnet
    network_mode: host
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # Mount the locally cloned "homelab-as-code" repository, in order to be able to run IaC
      - "../homelab-as-code:/homelab-as-code:rw"
      # Mount kube and talos config files, in order to update context for the local user
      # Make sure the directories exist on the host: `mkdir "${HOME}/.kube" "${HOME}/.talos"`
      - "${HOME}/.kube:/home/runner/.kube:rw"
      - "${HOME}/.talos:/home/runner/.talos:rw"
      # Mount task-ui history volume for persistent task execution history
      - "../homelab-as-code/task-ui/history:/home/runner/task-ui-history"
    # Used for file ownership for files created inside the container
    user: "${UID:-1000}:${GID:-1000}"
    command: ["/usr/local/bin/task-ui-wrapper", "--history-enable"]
    environment:
      - BWS_ACCESS_TOKEN=${BWS_ACCESS_TOKEN}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
