---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

set: [pipefail]
shopt: [globstar]
dotenv: [".env"]

vars:
  ANSIBLE_DIR: '{{.ROOT_DIR}}/ansible'
  TERRAGRUNT_DIR: '{{.ROOT_DIR}}/terragrunt/infrastructure-live'
  TERRAGRUNT_ENV: 'non-prod'
  PVE_NODE: 'pve'

# ── include sub‑taskfiles ────────────────────────────────────────────────────
includes:
  kubernetes: .taskfiles/kubernetes
  talos: .taskfiles/talos
  proxmox: .taskfiles/proxmox

tasks:
  default:
    desc: List all available tasks (root + included)
    cmds: ["task --list-all || go-task --list-all"]

  # ---------------------------------------------------------------------------
  # One‑shot pipeline: VM ➜ Talos ➜ K8s
  # ---------------------------------------------------------------------------
  cluster:up:
    desc: "Provision the non-prod cluster end-to-end"
    interactive: false
    cmds:                      # SEQUENTIAL execution
      # - task: proxmox:pve-cluster
      - task: talos:cluster
      - task: kubernetes:ansible-k8s
