---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

set: [pipefail]
shopt: [globstar]
dotenv: [".env"]

vars:
  ANSIBLE_DIR: '{{.ROOT_DIR}}/ansible'
  TERRAGRUNT_DIR: '{{.ROOT_DIR}}/terragrunt/infrastructure-live'
  TERRAGRUNT_ENV: 'non-prod'
  PVE_NODE: 'pve'

# ── include sub‑taskfiles ────────────────────────────────────────────────────
includes:
  # Common utilities
  common: .taskfiles/common
  # New taskfiles
  cluster: .taskfiles/cluster
  cloudflare: .taskfiles/cloudflare
  docker: .taskfiles/docker
  updates: .taskfiles/updates
  bootstrap: .taskfiles/bootstrap
  # Existing taskfiles
  kubernetes: .taskfiles/kubernetes
  talos: .taskfiles/talos
  proxmox: .taskfiles/proxmox

tasks:
  default:
    desc: List all available tasks (root + included)
    cmds: ["task --list-all || go-task --list-all"]
