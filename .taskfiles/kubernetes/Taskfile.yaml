---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'
set: [pipefail]
shopt: [globstar]
tasks:
  deploy:
    desc: "Run K8s Ansible playbook (prompts for BWS token)"
    dir: "ansible/ansible-k8s"
    interactive: false
    env:
      VAR_NAME: BWS_ACCESS_TOKEN
      VAR_CMD: ansible-playbook k8s-playbook.yml
    cmds:
      - sh "{{.ROOT_DIR}}/.taskfiles/common/scripts/prompt.sh"
    preconditions:
      - test -f "{{.ANSIBLE_DIR}}/ansible-k8s/k8s-playbook.yml"
      - which ansible-playbook
  bootstrap-secrets:
    desc: "Apply bootstrap-k8s-secrets (Terragrunt, needs BWS token)"
    dir: "{{.TERRAGRUNT_DIR}}/{{.TERRAGRUNT_ENV}}/{{.PVE_NODE}}/bootstrap-k8s-secrets"
    interactive: false
    env:
      VAR_NAME: BWS_ACCESS_TOKEN
      VAR_CMD: terragrunt stack run apply --non-interactive
    cmds:
      - sh "{{.ROOT_DIR}}/.taskfiles/common/scripts/prompt.sh"
    preconditions:
      - test -f "{{.TERRAGRUNT_DIR}}/{{.TERRAGRUNT_ENV}}/{{.PVE_NODE}}/bootstrap-k8s-secrets/terragrunt.stack.hcl"
      - which terragrunt
      - which tofu
  delete-all-proxygroups:
    desc: "⚠️  Delete all Tailscale ProxyGroup resources"
    prompt: "This will DELETE all Tailscale ProxyGroup resources. Are you sure?"
    cmds:
      - echo "Deleting all Tailscale ProxyGroup resources..."
      - kubectl delete proxygroups.tailscale.com --all
      - echo "All Tailscale ProxyGroup resources deleted."
    preconditions:
      - sh: which kubectl
        msg: "kubectl is required"
  delete-all-proxygroups-dryrun:
    desc: "Show what Tailscale ProxyGroup resources would be deleted (dry run)"
    cmds:
      - echo "=== DRY RUN - No resources will be deleted ==="
      - echo ""
      - echo "Would delete the following Tailscale ProxyGroup resources:"
      - kubectl get proxygroups.tailscale.com
    preconditions:
      - sh: which kubectl
        msg: "kubectl is required"
