---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

set: [pipefail]
shopt: [globstar]

includes:
  argocd: ../argocd

tasks:
  deploy:
    desc: "Run K8s Ansible playbook (prompts for BWS token)"
    dir: "ansible/ansible-k8s"
    interactive: false
    env:
      VAR_NAME: BWS_ACCESS_TOKEN
      VAR_CMD: ansible-playbook k8s-playbook.yml
    cmds:
      - sh "{{.ROOT_DIR}}/.taskfiles/common/scripts/prompt.sh"
    preconditions:
      - test -f "{{.ANSIBLE_DIR}}/ansible-k8s/k8s-playbook.yml"
      - which ansible-playbook

  bootstrap-secrets:
    desc: "Apply bootstrap-k8s-secrets (Terragrunt, needs BWS token)"
    dir: "{{.TERRAGRUNT_DIR}}/{{.TERRAGRUNT_ENV}}/{{.PVE_NODE}}/bootstrap-k8s-secrets"
    interactive: false
    env:
      VAR_NAME: BWS_ACCESS_TOKEN
      VAR_CMD: terragrunt stack run apply --non-interactive
    cmds:
      - sh "{{.ROOT_DIR}}/.taskfiles/common/scripts/prompt.sh"
    preconditions:
      - test -f "{{.TERRAGRUNT_DIR}}/{{.TERRAGRUNT_ENV}}/{{.PVE_NODE}}/bootstrap-k8s-secrets/terragrunt.stack.hcl"
      - which terragrunt
      - which tofu

  delete-all-ingress:
    desc: "Delete all ingress resources (disables Argo CD sync first)"
    cmds:
      - echo "Disabling Argo CD sync to prevent ingress recreation..."
      - task: argocd:disable-sync
      - echo "Deleting all ingress resources across all namespaces..."
      - kubectl delete ingress --all --all-namespaces
      - echo "All ingress resources deleted."
    preconditions:
      - sh: which kubectl
        msg: "kubectl is required"
