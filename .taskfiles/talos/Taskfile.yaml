---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

set: [pipefail]
shopt: [globstar]

tasks:
  cluster:
    desc: "Apply Talos cluster via Terragrunt (non-interactive)"
    dir: terragrunt/infrastructure-live/non-prod/pve/talos-cluster
    interactive: false
    cmd: terragrunt stack run apply --non-interactive
