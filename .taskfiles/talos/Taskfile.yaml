---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

set: [pipefail]
shopt: [globstar]

tasks:
  apply:
    desc: "Apply Talos cluster via Terragrunt (non-interactive)"
    dir: "{{.TERRAGRUNT_DIR}}/{{.TERRAGRUNT_ENV}}/{{.PVE_NODE}}/talos-cluster"
    interactive: false
    cmd: terragrunt stack run apply --non-interactive
    preconditions:
      - test -f "{{.TERRAGRUNT_DIR}}/{{.TERRAGRUNT_ENV}}/{{.PVE_NODE}}/talos-cluster/terragrunt.stack.hcl"
      - which terragrunt
      - which tofu

  destroy:
    desc: "Destroy Talos cluster infrastructure via Terragrunt"
    dir: "{{.TERRAGRUNT_DIR}}/{{.TERRAGRUNT_ENV}}/{{.PVE_NODE}}/talos-cluster"
    cmd: terragrunt stack run destroy --queue-exclude-dir "*/download_file"
    preconditions:
      - test -f "{{.TERRAGRUNT_DIR}}/{{.TERRAGRUNT_ENV}}/{{.PVE_NODE}}/talos-cluster/terragrunt.stack.hcl"
      - which terragrunt
      - which tofu

  plan:
    desc: "Show what would be applied (apply plan)"
    dir: "{{.TERRAGRUNT_DIR}}/{{.TERRAGRUNT_ENV}}/{{.PVE_NODE}}/talos-cluster"
    cmd: terragrunt stack run plan
    preconditions:
      - test -f "{{.TERRAGRUNT_DIR}}/{{.TERRAGRUNT_ENV}}/{{.PVE_NODE}}/talos-cluster/terragrunt.stack.hcl"
      - which terragrunt
      - which tofu

  plan-destroy:
    desc: "Show what would be destroyed (destroy plan)"
    dir: "{{.TERRAGRUNT_DIR}}/{{.TERRAGRUNT_ENV}}/{{.PVE_NODE}}/talos-cluster"
    cmd: terragrunt stack run --queue-exclude-dir "*/download_file" plan -- -destroy
    preconditions:
      - test -f "{{.TERRAGRUNT_DIR}}/{{.TERRAGRUNT_ENV}}/{{.PVE_NODE}}/talos-cluster/terragrunt.stack.hcl"
      - which terragrunt
      - which tofu
