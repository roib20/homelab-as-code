---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

set: [pipefail]
shopt: [globstar]

tasks:
  apply:
    desc: "Apply Talos cluster via Terragrunt (non-interactive)"
    dir: "{{.TERRAGRUNT_DIR}}/{{.TERRAGRUNT_ENV}}/{{.PVE_NODE}}/talos-cluster"
    interactive: false
    cmd: terragrunt stack run apply --non-interactive
    preconditions:
      - test -f "{{.TERRAGRUNT_DIR}}/{{.TERRAGRUNT_ENV}}/{{.PVE_NODE}}/talos-cluster/terragrunt.stack.hcl"
      - which terragrunt
      - which tofu
