---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

set: [pipefail]
shopt: [globstar]

includes:
  talos: ../talos
  kubernetes: ../kubernetes
  cloudflare: ../cloudflare

tasks:
  up:
    desc: "Provision the non-prod cluster end-to-end"
    interactive: false
    cmds:
      - task: talos:apply
      - task: kubernetes:deploy
    preconditions:
      - sh: which terragrunt
        msg: "terragrunt is required"
      - sh: which tofu
        msg: "tofu is required"
      - sh: which ansible-playbook
        msg: "ansible-playbook is required"

  down:
    desc: "⚠️  DESTROY cluster with confirmation"
    prompt: "This will DESTROY the entire cluster and clean Cloudflare resources. Are you sure?"
    cmds:
      - echo "Cleaning Cloudflare resources first..."
      - task: cloudflare:clean
      - echo "Destroying cluster infrastructure..."
      - task: talos:destroy
    preconditions:
      - sh: which terragrunt
        msg: "terragrunt is required"
      - sh: which tofu
        msg: "tofu is required"
      - sh: test -f "{{.TERRAGRUNT_DIR}}/{{.TERRAGRUNT_ENV}}/{{.PVE_NODE}}/talos-cluster/terragrunt.stack.hcl"
        msg: "Terragrunt stack config not found"

  down-dryrun:
    desc: "Show what would be destroyed (dry run)"
    cmds:
      - echo "=== DRY RUN - No resources will be destroyed ==="
      - echo ""
      - echo "Would clean the following Cloudflare resources:"
      - task: cloudflare:clean-dryrun
      - echo ""
      - echo "Would destroy the following infrastructure:"
      - cmd: terragrunt stack run plan -destroy --queue-exclude-dir "*/download_file"
        dir: "{{.TERRAGRUNT_DIR}}/{{.TERRAGRUNT_ENV}}/{{.PVE_NODE}}/talos-cluster"
    preconditions:
      - sh: which terragrunt
        msg: "terragrunt is required"
      - sh: which tofu
        msg: "tofu is required"
      - sh: test -f "{{.TERRAGRUNT_DIR}}/{{.TERRAGRUNT_ENV}}/{{.PVE_NODE}}/talos-cluster/terragrunt.stack.hcl"
        msg: "Terragrunt stack config not found"

  rebuild:
    desc: "Destroy and rebuild cluster for rapid testing"
    cmds:
      - task: down
      - task: up
    preconditions:
      - sh: which terragrunt
        msg: "terragrunt is required"
      - sh: which tofu
        msg: "tofu is required"
      - sh: which ansible-playbook
        msg: "ansible-playbook is required"

  status:
    desc: "Check cluster health and status"
    cmds:
      - echo "=== Cluster Nodes ==="
      - kubectl get nodes -o wide
      - echo "=== Cluster Pods ==="
      - kubectl get pods --all-namespaces
      - echo "=== ArgoCD Applications ==="
      - kubectl get applications -n argocd 2>/dev/null || echo "ArgoCD not installed"
    preconditions:
      - sh: which kubectl
        msg: "kubectl is required"

  info:
    desc: "Show cluster information and ArgoCD access details"
    cmds:
      - echo "=== Cluster Info ==="
      - kubectl cluster-info
      - echo ""
      - echo "=== ArgoCD Access ==="
      - cmd: |
          if kubectl get namespace argocd >/dev/null 2>&1; then
            echo "ArgoCD admin password:"
            kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d 2>/dev/null || echo "Password secret not found"
            echo ""
            echo "Access ArgoCD with: task cluster:argocd"
          else
            echo "ArgoCD not installed"
          fi
    preconditions:
      - sh: which kubectl
        msg: "kubectl is required"

  argocd:
    desc: "Get ArgoCD admin password and start port-forward"
    cmds:
      - cmd: |
          echo "ArgoCD admin password:"
          kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
          echo
          echo
          echo "Starting port-forward to http://localhost:8080..."
          echo "Press Ctrl+C to stop port-forward"
          kubectl port-forward svc/argocd-server -n argocd 8080:443
    preconditions:
      - sh: which kubectl
        msg: "kubectl is required"
      - sh: kubectl get namespace argocd
        msg: "ArgoCD namespace not found. Run 'task cluster:up' first."