name: Validate All Terragrunt Stacks and Format HCL+TF Files
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/terragrunt-validate-and-fmt.yml'
  pull_request:
    paths:
      - '**/*.tf'
      - '**/*.hcl'
      - '**/*.hcl.example'
      - '.github/workflows/terragrunt-validate-and-fmt.yml'
  workflow_dispatch:
jobs:
  validate-and-fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Terragrunt & OpenTofu
        uses: gruntwork-io/terragrunt-action@v3
      - name: Create test `account.hcl` files from examples
        shell: sh
        run: |
          find terragrunt/infrastructure-live -name "account.hcl.example" | while read -r example_file; do
            account_file="${example_file%.example}"
            if [ ! -f "$account_file" ]; then
              cp "$example_file" "$account_file"
              echo "Created $account_file from $example_file"
            fi
          done
      - name: Create test SSH key
        shell: sh
        run: |
          mkdir -p "${HOME}/.ssh"
          ssh-keygen -t rsa -b 4096 -f "${HOME}/.ssh/id_rsa" -N "" -C "runner@$(hostname)"
      - name: Validate all Terragrunt Stacks
        env:
          BWS_ACCESS_TOKEN: "123"
        shell: sh
        run: |
          find . -type f -name "terragrunt.stack.hcl" \
          | xargs -I {} sh -c 'terragrunt --working-dir="$(dirname "{}")" stack run --config="terragrunt.stack.hcl" validate'
      - name: Check formatting for all HCL files (including `docker-bake.hcl` files)
        shell: sh
        run: |
          terragrunt hcl fmt --check
      - name: Check formatting for all tf files
        shell: sh
        run: |
          tofu fmt -recursive --check || terraform fmt -recursive --check
