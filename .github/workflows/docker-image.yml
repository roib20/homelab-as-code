# .github/workflows/build-and-sign.yml
name: Build & Sign containers

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:                       # needed for push + OIDC signing
  contents:  read
  packages:  write                 # push to ghcr.io / docker.io
  id-token:  write                 # Cosign key-less signing

jobs:
  build-and-sign:
    runs-on: ubuntu-latest

    steps:
    # 0) Optional – check out the repo if you need local context
    - uses: actions/checkout@v4

    # 1) Multi-arch helpers ---------------------------------------------------
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Buildx
      uses: docker/setup-buildx-action@v3

    # 2) Log in to your registry ---------------------------------------------
    #    – here GHCR; swap for DockerHub / ECR etc.
    - name: Login to ghcr.io
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 3) Build with Bake ------------------------------------------------------
    - name: Build & push images
      id: bake                       # <-- captures `outputs.metadata`
      uses: docker/bake-action@v6    # :contentReference[oaicite:0]{index=0}
      with:
        files: |                     # the two bake files you mentioned
          docker-bake.hcl
          docker-bake.override.hcl
        targets: local               # equivalent to `docker buildx bake local`
        # push: true                 # unnecessary – bake files already set push

    # 4) Install Cosign -------------------------------------------------------
    - name: Install cosign
      uses: sigstore/cosign-installer@v3.9.1  # pin or omit version as you like :contentReference[oaicite:1]{index=1}

    # 5) Sign every digest produced by Bake -----------------------------------
    - name: Sign pushed images
      shell: bash
      env:
        COSIGN_EXPERIMENTAL: "1"
        META_JSON: ${{ steps.bake.outputs.metadata }}
      run: |
        echo "$META_JSON" | jq -r '
          ..|objects|select(has("name") and has("digest")) |
          "\(.name)@\(.digest)"
        ' | sort -u | while read -r ref; do
          echo "🔏 Signing $ref"
          cosign sign --yes "$ref"
        done
