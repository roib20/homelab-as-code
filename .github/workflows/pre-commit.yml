---
name: pre-commit
'on':
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  pre-commit:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - uses: gruntwork-io/terragrunt-action@v3
      - uses: pre-commit/action@v3.0.1
