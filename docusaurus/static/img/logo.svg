  <line x1="14.5" y1="17.5" x2="14.5" y2="19" stroke="#4C566A" stroke-width="0.3"/>
  <line x1="15.5" y1="17.5" x2="15.5" y2="19" stroke="#4C566A" stroke-width="0.3"/>
  <line x1="16.5" y1="17.5" x2="16.5" y2="19" stroke="#4C566A" stroke-width="0.3"/>
