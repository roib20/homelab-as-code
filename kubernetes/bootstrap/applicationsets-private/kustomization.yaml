---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cluster-apps-private.yaml
  - cluster-resources-private.yaml
configMapGenerator:
  - name: env-vars
    envs:
      - /tmp/env-vars.env
replacements:
  - source:
      kind: ConfigMap
      name: env-vars
      fieldPath: data.PRIVATE_REPO_01
    targets:
      - select:
          kind: ApplicationSet
        fieldPaths:
          - spec.generators.0.git.repoURL
          - spec.template.spec.source.repoURL
