---
{
  apiVersion: "argoproj.io/v1alpha1",
  kind: "Application",
  metadata: {
    name: "app-of-apps",
    namespace: "argocd",
    finalizers: [
      "resources-finalizer.argocd.argoproj.io",
    ],
  },
  spec: {
    destination: {
      name: "in-cluster",
      namespace: "argocd",
    },
    ignoreDifferences: [{
      group: "argoproj.io",
      jsonPointers: [
        "/status",
      ],
      kind: "Application",
    }],
    project: "default",
    source: {
      path: "kubernetes/bootstrap",
      repoURL: "https://github.com/roib20/homelab-as-code.git",
      targetRevision: "HEAD",
    },
    syncPolicy: {
      automated: {
        prune: true,
        selfHeal: true,
      },
    },
  },
}
