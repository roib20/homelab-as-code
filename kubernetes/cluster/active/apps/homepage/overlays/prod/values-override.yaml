---
global:
  fallbackDefaults:
    storageClass: longhorn
    pvcRetain: false
    pvcSize: 1Gi
ingress:
  main:
    enabled: true
    ingressClassName: tailscale
    annotations:
      tailscale.com/proxy-group: ingress-proxies
    hosts:
      - host: "home.${FQDN_02}"
        paths:
          - path: "/"
            pathType: Prefix
    tls:
      - hosts:
          - "home.${FQDN_02}"
workload:
  main:
    podSpec:
      annotations:
        configmap.reloader.stakater.com/reload: homepage-config
        secret.reloader.stakater.com/reload: homepage-secrets
      containers:
        main:
          env:
            HOMEPAGE_ALLOWED_HOSTS: "localhost,home.${FQDN_02}"
          envFrom:
            - secretRef:
                name: homepage-secrets
                expandObjectName: false
