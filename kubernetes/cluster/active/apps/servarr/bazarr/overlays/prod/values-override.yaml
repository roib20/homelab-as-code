---
global:
  fallbackDefaults:
    storageClass: longhorn
    pvcRetain: false
    pvcSize: 1Gi
podOptions:
  defaultAffinity: false
workload:
  main:
    podSpec:
      containers:
        main:
          env:
            DYNACONF_AUTH__TYPE: basic
            DYNACONF_AUTH__APIKEY:
              secretKeyRef:
                name: servarr-api-keys
                key: bazarr_api_key
                expandObjectName: false
            POSTGRES_ENABLED: true
            POSTGRES_HOST:
              secretKeyRef:
                name: servarr-postgres-app
                key: host
                expandObjectName: false
            POSTGRES_PORT:
              secretKeyRef:
                name: servarr-postgres-app
                key: port
                expandObjectName: false
            POSTGRES_USERNAME:
              secretKeyRef:
                name: servarr-postgres-app
                key: user
                expandObjectName: false
            POSTGRES_PASSWORD:
              secretKeyRef:
                name: servarr-postgres-app
                key: password
                expandObjectName: false
            POSTGRES_DATABASE: bazarr
        exportarr:
          env:
            API_KEY:
              secretKeyRef:
                name: servarr-api-keys
                key: bazarr_api_key
                expandObjectName: false
ingress:
  main:
    enabled: true
    ingressClassName: tailscale
    annotations:
      tailscale.com/proxy-group: ingress-proxies
      gethomepage.dev/enabled: "true"
      gethomepage.dev/description: Bazarr is a companion application to Sonarr and Radarr that manages and downloads subtitles.
      gethomepage.dev/group: Servarr
      gethomepage.dev/icon: bazarr.svg
      gethomepage.dev/name: Bazarr
      gethomepage.dev/pod-selector: "app.kubernetes.io/instance=bazarr"
      gethomepage.dev/widget.type: "bazarr"
      gethomepage.dev/widget.url: "http://bazarr.servarr.svc.cluster.local:6767"
      gethomepage.dev/widget.key: "{{`{{HOMEPAGE_VAR_BAZARR_KEY}}`}}"
    hosts:
      - host: "bazarr.${FQDN_02}"
        paths:
          - path: "/"
            pathType: Prefix
    tls:
      - hosts:
          - "bazarr.${FQDN_02}"
persistence:
  config:
    enabled: true
    mountPath: "/config"
    targetSelector:
      main:
        main:
          mountPath: /config
        exportarr:
          mountPath: /config
          readOnly: true
  mediadata:
    enabled: true
    type: pvc
    mountPath: "/MediaData"
    readOnly: false
    existingClaim: smb-mediadata-rwx
metrics:
  main:
    enabled: true
    type: "servicemonitor"
    endpoints:
      - port: metrics
        path: /metrics
    targetSelector: metrics
    prometheusRule:
      enabled: true
