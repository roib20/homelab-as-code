---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
helmCharts:
  - name: bazarr
    repo: oci://oci.trueforge.org/truecharts
    version: 23.6.2
    releaseName: bazarr-hd
    namespace: servarr
    valuesFile: ../../base/values.yaml
    additionalValuesFiles:
      - values-override.yaml
    includeCRDs: true
configMapGenerator:
  - name: env-vars-bazarr-hd
    envs:
      - /tmp/env-vars.env
replacements:
  - path: replacements.yaml
