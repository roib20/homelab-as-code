---
global:
  createDefaultServiceAccount: true
defaultPodOptionsStrategy: merge
defaultPodOptions:
  automountServiceAccountToken: false
  securityContext:
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault

controllers:
  pinepods:
    pod:
      annotations:
        secret.reloader.stakater.com/reload: "pinepods-env,pinepods-kanidm-oauth2-credentials,pinepods-postgres-app"
      securityContext:
        runAsUser: 0
        runAsGroup: 1000
        fsGroup: 1000
    initContainers:
      wait-for-valkey:
        image:
          repository: madeofpendletonwool/pinepods
          tag: 0.9.0@sha256:ebc258bb0c62cdb69e5fb726b247c885dac19b50d06fed68fa8d37197b88ace4
        command:
          - sh
          - -c
          - until nc -z pinepods-valkey 6379; do sleep 2; done
    containers:
      app:
        securityContext:
          capabilities:
            drop:
              - ALL
            add:
              - CHOWN
              - DAC_OVERRIDE
              - SETGID
              - SETUID
        image:
          repository: madeofpendletonwool/pinepods
          tag: 0.9.0@sha256:ebc258bb0c62cdb69e5fb726b247c885dac19b50d06fed68fa8d37197b88ace4
        env:
          DB_TYPE: postgresql
          DB_USER:
            valueFrom:
              secretKeyRef:
                name: pinepods-postgres-app
                key: user
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: pinepods-postgres-app
                key: password
          DB_HOST:
            valueFrom:
              secretKeyRef:
                name: pinepods-postgres-app
                key: host
          DB_PORT: "5432"
          DB_NAME: pinepods_database
          VALKEY_HOST: pinepods-valkey
          VALKEY_PORT: "6379"
          SEARCH_API_URL: "https://search.pinepods.online/api/search"
          PEOPLE_API_URL: "https://people.pinepods.online"
          DEBUG_MODE: "false"
          OIDC_PROVIDER_NAME: "Kanidm"
          OIDC_CLIENT_ID:
            valueFrom:
              secretKeyRef:
                name: pinepods-kanidm-oauth2-credentials
                key: CLIENT_ID
          OIDC_CLIENT_SECRET:
            valueFrom:
              secretKeyRef:
                name: pinepods-kanidm-oauth2-credentials
                key: CLIENT_SECRET
          OIDC_AUTHORIZATION_URL: "https://auth.${FQDN_01}/ui/oauth2"
          OIDC_TOKEN_URL: "https://auth.${FQDN_01}/oauth2/token"
          OIDC_USER_INFO_URL: "https://auth.${FQDN_01}/oauth2/openid/$(OIDC_CLIENT_ID)/userinfo"
          OIDC_SCOPE: "openid email profile groups_name"
          OIDC_NAME_CLAIM: "name"
          OIDC_EMAIL_CLAIM: "email"
          OIDC_USERNAME_CLAIM: "preferred_username"
          OIDC_ROLES_CLAIM: "groups"
          OIDC_USER_ROLE: "pinepods-users"
          OIDC_ADMIN_ROLE: "pinepods-admins"
          OIDC_BUTTON_TEXT: "Login with Kanidm"
          OIDC_BUTTON_COLOR: "#000000"
          OIDC_BUTTON_TEXT_COLOR: "#FFFFFF"
          OIDC_DISABLE_STANDARD_LOGIN: "true"
        envFrom:
          - secretRef:
              name: pinepods-env
        probes:
          liveness:
            enabled: true
            spec:
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthcheck
                port: 8040
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
          startup:
            enabled: true
            spec:
              failureThreshold: 30
              periodSeconds: 10
        resources:
          requests:
            cpu: 50m
          limits:
            memory: 1.5Gi

