  valkey:
    defaultContainerOptionsStrategy: merge
    defaultContainerOptions:
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
    pod:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        runAsNonRoot: true
        fsGroup: 999
    containers:
      app:
        image:
          repository: ghcr.io/valkey-io/valkey
          tag: 9.1.0
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - valkey-cli
                  - ping
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - valkey-cli
                  - ping
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - valkey-cli
                  - ping
              failureThreshold: 10
              periodSeconds: 5
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 128Mi

service:
  app:
    controller: pinepods
    ports:
      http:
        port: 8040
  # backend:
  #   controller: backend
  #   ports:
  #     http:
  #       port: 5000
  # podpeople:
  #   controller: podpeople
  #   ports:
  #     http:
  #       port: 8085
  valkey:
    controller: valkey
    ports:
      valkey:
        port: 6379

persistence:
  config:
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: longhorn
    advancedMounts:
      pinepods:
        app:
          - path: /opt/pinepods
  backup:
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: longhorn
    advancedMounts:
      pinepods:
        app:
          - path: /opt/pinepods/backups
  tmpfs:
    type: emptyDir
    advancedMounts:
      pinepods:
        app:
          - path: /pinepods/cache
            subPath: cache
          - path: /tmp
            subPath: tmp
          - path: /var/log/pinepods
            subPath: log
          - path: /etc/horust/services
            subPath: horust-services
  # podpeople-data:
  #   accessMode: ReadWriteOnce
  #   size: 1Gi
  #   storageClass: longhorn
  #   advancedMounts:
  #     podpeople:
  #       app:
  #         - path: /app/podpeople-data
  valkey-data:
    type: emptyDir
    advancedMounts:
      valkey:
        app:
          - path: /data

rawResources:
  database:
    forceRename: pinepods-postgres
    manifest:
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      spec:
        instances: 1
        bootstrap:
          initdb:
            database: pinepods_database
            owner: pinepods
        managed:
          services:
            disabledDefaultServices:
              - ro
              - r
        storage:
          size: 3Gi
          storageClass: longhorn-cnpg
        resources:
          requests:
            cpu: 75m
            memory: 200Mi
          limits:
            cpu: 1500m
            memory: 2400Mi

  external-secret-pinepods:
    forceRename: pinepods-env
    manifest:
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      spec:
        refreshInterval: 1h
        secretStoreRef:
          name: bitwarden-secretsmanager
          kind: ClusterSecretStore
        target:
          name: pinepods-env
          creationPolicy: Owner
          template:
            engineVersion: v2
            type: Opaque
            data:
              USERNAME: '{{ "{{" }} .pinepods_admin_username {{ "}}" }}'
              PASSWORD: '{{ "{{" }} .pinepods_admin_password {{ "}}" }}'
              FULLNAME: '{{ "{{" }} .pinepods_admin_fullname {{ "}}" }}'
              EMAIL: '{{ "{{" }} .pinepods_admin_email {{ "}}" }}'
        dataFrom:
          - extract:
              key: pinepods-secrets
              conversionStrategy: Default
              decodingStrategy: None
              metadataPolicy: None

