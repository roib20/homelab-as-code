# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/outlinewiki/outline
  pullPolicy: IfNotPresent
  tag: 1.6.1@sha256:a750f764080ce28d4a7393176011c8e2e4170b41689a8f6d91327dadf4904eb6
service:
  main:
    ports:
      main:
        port: 10196
# Enabled redis
redis:
  enabled: true
  redisUsername: default
# Enabled postgres
cnpg:
  main:
    enabled: true
    user: outline
    database: outline

securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              path: "/_health"
            readiness:
              path: "/_health"
            startup:
              path: "/_health"
          env:
            FORCE_HTTPS: false
            PGSSLMODE: "disable"
            PORT: "{{ .Values.service.main.ports.main.port }}"
            # User defined
            URL: "https://outline.${FQDN_01}"
            SLACK_MESSAGE_ACTIONS: false
            ENABLE_UPDATES: true
            WEB_CONCURRENCY: 1
            MAXIMUM_IMPORT_SIZE: 5120000
            DEFAULT_LANGUAGE: "en_US"
            FILE_STORAGE: "local"
            FILE_STORAGE_UPLOAD_MAX_SIZE: 26214400
            # Generic OIDC provider
            # DOCS: https://docs.getoutline.com/s/hosting/doc/oidc-8CPBm6uC0I
            OIDC_CLIENT_ID:
              secretKeyRef:
                expandObjectName: false
                name: outline-kanidm-oauth2-credentials
                key: CLIENT_ID
            OIDC_CLIENT_SECRET:
              secretKeyRef:
                expandObjectName: false
                name: outline-kanidm-oauth2-credentials
                key: CLIENT_SECRET
            OIDC_ISSUER_URL: "https://auth.${FQDN_01}/oauth2/openid/outline"
            OIDC_DISABLE_REDIRECT: true
            OIDC_USERNAME_CLAIM: "preferred_username"
            OIDC_DISPLAY_NAME: "Kanidm"
            OIDC_SCOPES: "openid profile email"
            # TEAM_LOGO: ""
            # COLLABORATION_URL: ""
            # SLACK_KEY: ""
            # SLACK_SECRET: ""
            # SLACK_VERIFICATION_TOKEN: ""
            # SLACK_APP_ID: ""
            # GOOGLE_CLIENT_ID: ""
            # GOOGLE_CLIENT_SECRET: ""
            # GOOGLE_ANALYTICS_ID: ""
            # AZURE_CLIENT_ID: ""
            # AZURE_CLIENT_SECRET: ""
            # AZURE_RESOURCE_APP_ID: ""
            # OIDC_CLIENT_ID: ""
            # OIDC_CLIENT_SECRET: ""
            # OIDC_AUTH_URI: ""
            # OIDC_TOKEN_URI: ""
            # OIDC_USERINFO_URI: ""
            # OIDC_USERNAME_CLAIM: ""
            # OIDC_DISPLAY_NAME: ""
            # OIDC_SCOPES: ""
            # SENTRY_DSN: ""
            # AWS_ACCESS_KEY_ID: ""
            # AWS_SECRET_ACCESS_KEY: ""
            # AWS_REGION: ""
            # AWS_S3_ACCELERATE_URL: ""
            # AWS_S3_UPLOAD_BUCKET_URL: ""
            # AWS_S3_UPLOAD_BUCKET_NAME: ""
            # AWS_S3_UPLOAD_MAX_SIZE: 26214400
            # AWS_S3_FORCE_PATH_STYLE: true
            # AWS_S3_ACL: ""
            # SMTP_HOST: ""
            # SMTP_PORT: 587
            # SMTP_USERNAME: ""
            # SMTP_PASSWORD: ""
            # SMTP_FROM_EMAIL: ""
            # SMTP_REPLY_EMAIL: ""
            # SMTP_SECURE: true

            DATABASE_URL:
              secretKeyRef:
                name: cnpg-main-urls
                key: std
            REDIS_URL:
              secretKeyRef:
                expandObjectName: false
                name: '{{ printf "%s-%s" .Release.Name "rediscreds" }}'
                key: url
            SECRET_KEY:
              secretKeyRef:
                name: secrets
                key: SECRET_KEY
            UTILS_SECRET:
              secretKeyRef:
                name: secrets
                key: UTILS_SECRET
persistence:
  data:
    enabled: true
    mountPath: /var/lib/outline/data
