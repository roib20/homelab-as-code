---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zeroclaw
  annotations:
    tailscale.com/proxy-group: ingress-proxies
spec:
  ingressClassName: tailscale
  rules:
    - host: "zeroclaw.${FQDN_02}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zeroclaw
                port:
                  name: gateway
  tls:
    - hosts:
        - "zeroclaw.${FQDN_02}"
