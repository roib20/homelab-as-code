---
controllers:
  zeroclaw:
    annotations:
      configmap.reloader.stakater.com/reload: "zeroclaw-config,zeroclaw-mise"
      secret.reloader.stakater.com/reload: "zeroclaw-auth-codex,zeroclaw-groq-api-key,zeroclaw-ha-mcp,zeroclaw-secret-key,zeroclaw-telegram-default-bot,zeroclaw-telegram-smart-homer-bot"
    initContainers:
      bootstrap:
        image:
          repository: ghcr.io/zeroclaw-labs/zeroclaw
          tag: v0.8.3-debian@sha256:287325c1446d14ee8e8ca9ed2f424c718652b811f91bfb6155eca07aba054466
        command:
          - /bin/sh
          - -c
        args:
          - |
            set -eu
            curl --proto '=https' --tlsv1.3 -L https://mise.run | sh
            mise trust "${MISE_GLOBAL_CONFIG_FILE}"
            mise --yes install
            mise --yes prune --tools
            if ! zeroclaw auth status |
              grep -q '^[* ]*openai-codex:[^ ]* kind=OAuth'
            then
              zeroclaw auth login --model-provider openai-codex --import "${HOME}/.codex/auth.json"
            fi
        env:
          HOME: "/zeroclaw-data"
          MISE_GLOBAL_CONFIG_FILE: "$(HOME)/mise.toml"
          PATH: "$(HOME)/.local/bin:$(HOME)/.local/share/mise/shims\
                 :\
                 /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          ZEROCLAW_CONFIG_DIR: "$(HOME)"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            memory: 256Mi
      ha-mcp:
        restartPolicy: Always
        image:
          repository: ghcr.io/homeassistant-ai/ha-mcp
          tag: 7.14.2@sha256:7917b2d385e16e43f45f92fc72a757e5c0aec8d88b3cd69fe64f3b5106cbfe36
        args:
          - ha-mcp-web
        env:
          ENABLE_BETA_FEATURES: "true"
          ENABLE_CODE_MODE: "false"
          ENABLE_YAML_CONFIG_EDITING: "true"
          ENABLE_YAML_EDIT_CONFIRM: "true"
          ENABLE_YAML_PACKAGES_AUTOMATION: "true"
          ENABLE_YAML_PACKAGES_SCENE: "true"
          ENABLE_YAML_PACKAGES_SCRIPT: "true"
          ENVIRONMENT: "production"
          HAMCP_BACKUP_DIR: "/home/mcpuser/.ha-mcp/backups"
          HAMCP_ENABLE_DEV_MODE: "false"
          HAMCP_ENABLE_FILESYSTEM_TOOLS: "true"
          HA_MCP_CONFIG_DIR: "/home/mcpuser/.ha-mcp"
          HA_MCP_DISABLE_SETTINGS_UI: "true"
          MCP_HEALTHZ: "true"
          MCP_HOST: "127.0.0.1"
          MCP_PORT: "8086"
        envFrom:
          - secretRef:
              name: zeroclaw-ha-mcp
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - python
                  - -c
                  - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8086/healthz", timeout=1).close()
              failureThreshold: 60
              periodSeconds: 1
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 256Mi
    containers:
      app:
        envFrom:
          - secretRef:
              name: zeroclaw-groq-api-key
          - secretRef:
              name: zeroclaw-telegram-default-bot
          - secretRef:
              name: zeroclaw-telegram-smart-homer-bot
persistence:
  zeroclaw:
    globalMounts: []
    advancedMounts:
      zeroclaw:
        app:
          - path: "/zeroclaw-data"
        bootstrap:
          - path: "/zeroclaw-data"
  config:
    globalMounts: []
    advancedMounts:
      zeroclaw:
        app:
          - path: "/zeroclaw-data/config.toml"
            subPath: "config.toml"
            readOnly: true
        bootstrap:
          - path: "/zeroclaw-data/config.toml"
            subPath: "config.toml"
            readOnly: true
  secret-key:
    globalMounts: []
    defaultMode: 0400
    advancedMounts:
      zeroclaw:
        app:
          - path: "/zeroclaw-data/.secret_key"
            subPath: "secret-key"
            readOnly: true
        bootstrap:
          - path: "/zeroclaw-data/.secret_key"
            subPath: "secret-key"
            readOnly: true
  tmp:
    globalMounts: []
    advancedMounts:
      zeroclaw:
        app:
          - path: "/tmp"
        bootstrap:
          - path: "/tmp"
  codex-auth:
    type: secret
    name: zeroclaw-auth-codex
    advancedMounts:
      zeroclaw:
        bootstrap:
          - path: "/zeroclaw-data/.codex/auth.json"
            subPath: "auth.json"
            readOnly: true
  mise:
    type: configMap
    name: zeroclaw-mise
    advancedMounts:
      zeroclaw:
        app:
          - path: "/zeroclaw-data/mise.toml"
            subPath: "mise.toml"
            readOnly: true
        bootstrap:
          - path: "/zeroclaw-data/mise.toml"
            subPath: "mise.toml"
            readOnly: true
  ha-mcp-data:
    type: emptyDir
    advancedMounts:
      zeroclaw:
        ha-mcp:
          - path: "/home/mcpuser/.ha-mcp"
  ha-mcp-tmp:
    type: emptyDir
    advancedMounts:
      zeroclaw:
        ha-mcp:
          - path: "/tmp"
