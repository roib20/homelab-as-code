---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: seerr-postgres
spec:
  instances: 1
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
  bootstrap:
    initdb:
      database: seerr
      owner: seerr
  managed:
    services:
      disabledDefaultServices:
        - ro
        - r
  storage:
    size: 5Gi
    storageClass: longhorn-cnpg
