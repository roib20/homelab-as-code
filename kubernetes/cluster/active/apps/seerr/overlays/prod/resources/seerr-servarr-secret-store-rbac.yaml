---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: seerr-servarr-secret-store
  namespace: servarr
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["servarr-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: seerr-servarr-secret-store
  namespace: servarr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: seerr-servarr-secret-store
subjects:
  - kind: ServiceAccount
    name: external-secrets
    namespace: external-secrets
