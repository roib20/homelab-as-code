---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: blocky-dns-l2-announcement-policy
spec:
  serviceSelector:
    matchLabels:
      io.kubernetes.service.namespace: blocky
      io.kubernetes.service.name: blocky-dns
  interfaces:
    - ^ens18$
  loadBalancerIPs: true
---
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: blocky-lb-pool
spec:
  blocks:
    - start: 192.168.1.53
      stop: 192.168.1.53
  serviceSelector:
    matchLabels:
      io.kubernetes.service.namespace: blocky
      io.kubernetes.service.name: blocky-dns
