---
gitea:
  admin:
    existingSecret: gitea-admin-secret

  oauth:
    - name: "kanidm"
      provider: "openidConnect"
      existingSecret: "forgejo-oauth-secret"
      # Uses shell variable - expanded at runtime from env var
      autoDiscoverUrl: "https://${OAUTH_IDP_DOMAIN}/oauth2/openid/forgejo/.well-known/openid-configuration"
      iconUrl: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/kanidm.svg"
      scopes: "openid email profile groups_name ssh_publickeys"

  podAnnotations:
    secret.reloader.stakater.com/reload: "forgejo-oauth-secret,gitea-admin-secret"

  config:
    oauth2_client:
      OPENID_CONNECT_SCOPES: "openid email profile groups_name ssh_publickeys"
      ENABLE_AUTO_REGISTRATION: true
      USERNAME: nickname
    openid:
      ENABLE_OPENID_SIGNIN: false
      ENABLE_OPENID_SIGNUP: false
    service:
      DISABLE_REGISTRATION: false
      ALLOW_ONLY_EXTERNAL_REGISTRATION: true
      SHOW_REGISTRATION_BUTTON: false

# Use env vars for FQDN-dependent config (targetable by kustomize replacements)
deployment:
  env:
    - name: FORGEJO__OPENID__WHITELISTED_URIS
      value: "https://auth.${FQDN_01}"
    - name: FORGEJO__SERVER__DOMAIN
      value: "git.${FQDN_01}"
    - name: FORGEJO__SERVER__ROOT_URL
      value: "https://git.${FQDN_01}"
    - name: OAUTH_IDP_DOMAIN
      value: "auth.${FQDN_01}"

httpRoute:
  enabled: true
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: http-gateway-api
      namespace: istio-ingress
  hostnames:
    - "git.${FQDN_01}"
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Self-hosted lightweight software forge.
    gethomepage.dev/group: Operations
    gethomepage.dev/icon: forgejo.svg
    gethomepage.dev/name: Forgejo
    gethomepage.dev/widget.type: "gitea"
    gethomepage.dev/widget.url: "http://forgejo-http.forgejo.svc.cluster.local:3000"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_FORGEJO_KEY}}"
