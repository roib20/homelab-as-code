---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - gitea-admin-secret.yaml.externalsecret
helmCharts:
  - name: forgejo
    repo: oci://code.forgejo.org/forgejo-helm
    version: 16.0.1
    releaseName: forgejo
    namespace: forgejo
    valuesFile: ../../base/values.yaml
    additionalValuesFiles:
      - values-override.yaml
    includeCRDs: true
configMapGenerator:
  - name: env-vars
    envs:
      - /tmp/env-vars.env
replacements:
  - path: replacements.yaml
