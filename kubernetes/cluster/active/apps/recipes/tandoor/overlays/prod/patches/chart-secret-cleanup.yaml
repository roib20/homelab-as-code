---
# Drop the redundant chart-generated SECRET_KEY secret and the pod-template
# checksum that hashes it. SECRET_KEY is sourced from the managed `tandoor-secret`
# instead; the chart's `recipes-secrets` uses `lookup`, which can't reach the
# cluster under kustomize+helm, so its value (and the checksum) regenerates on
# every render and would otherwise churn pods / cause perpetual Argo CD drift.
$patch: delete
apiVersion: v1
kind: Secret
metadata:
  name: tandoor-recipes-recipes-secrets
  namespace: tandoor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tandoor-recipes
  namespace: tandoor
spec:
  template:
    metadata:
      annotations:
        checksum/secrets: null
