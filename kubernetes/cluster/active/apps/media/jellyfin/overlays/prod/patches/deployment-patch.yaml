---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - control-plane-01
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: jellyfin-gpu-claim
      containers:
        - name: jellyfin
          resources:
            claims:
              - name: gpu
