---
deployment:
  annotations:
    secret.reloader.stakater.com/reload: "opengist-kanidm-oauth2-credentials,opengist-meilisearch"
  env:
    - name: OG_OIDC_CLIENT_KEY
      valueFrom:
        secretKeyRef:
          name: opengist-kanidm-oauth2-credentials
          key: CLIENT_ID
    - name: OG_OIDC_DISCOVERY_URL
      value: "https://auth.${FQDN_01}/oauth2/openid/$(OG_OIDC_CLIENT_KEY)/.well-known/openid-configuration"
    - name: OG_OIDC_PROVIDER_NAME
      value: "Kanidm"
    - name: OG_OIDC_GROUP_CLAIM_NAME
      value: "groups"
    - name: OG_OIDC_ADMIN_GROUP
      value: "opengist-admins"
    - name: OG_EXTERNAL_URL
      value: "https://gist.${FQDN_01}"
    - name: OG_SSH_EXTERNAL_DOMAIN
      value: "gist.${FQDN_01}"
    - name: OG_SSH_GIT_ENABLED
      value: "true"
    - name: OG_OPENGIST_HOME
      value: /opengist
  envFromSecrets:
    - name: OG_OIDC_SECRET
      secretName: opengist-kanidm-oauth2-credentials
      secretKey: CLIENT_SECRET
    - name: OG_MEILI_API_KEY
      secretName: opengist-meilisearch
      secretKey: MEILI_MASTER_KEY

meilisearch:
  enabled: true
  environment:
    MEILI_ENV: production
  auth:
    existingMasterKeySecret: opengist-meilisearch
  podAnnotations:
    secret.reloader.stakater.com/reload: "opengist-meilisearch"
