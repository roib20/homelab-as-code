---
replicaCount: 2

config:
  db-uri: "postgres://placeholder"  # satisfies chart fail-fast validation; OG_DB_URI env var overrides at runtime

deployment:
  annotations:
    secret.reloader.stakater.com/reload: "opengist-kanidm-oauth2-credentials,opengist-meilisearch,opengist-postgres-app,opengist-postgres-ca"
  env:
    - name: UID
      value: "1000"
    - name: GID
      value: "1000"
    - name: OG_OIDC_CLIENT_KEY
      valueFrom:
        secretKeyRef:
          name: opengist-kanidm-oauth2-credentials
          key: CLIENT_ID
    - name: OG_OIDC_DISCOVERY_URL
      value: "https://auth.${FQDN_01}/oauth2/openid/$(OG_OIDC_CLIENT_KEY)/.well-known/openid-configuration"
    - name: OG_OIDC_PROVIDER_NAME
      value: "Kanidm"
    - name: OG_OIDC_GROUP_CLAIM_NAME
      value: "groups"
    - name: OG_OIDC_ADMIN_GROUP
      value: "opengist-admins"
    - name: OG_EXTERNAL_URL
      value: "https://gist.${FQDN_01}"
    - name: OG_SSH_EXTERNAL_DOMAIN
      value: "gist.${FQDN_01}"
    - name: OG_SSH_GIT_ENABLED
      value: "true"
    - name: OG_OPENGIST_HOME
      value: /opengist
    - name: _PG_URI
      valueFrom:
        secretKeyRef:
          name: opengist-postgres-app
          key: uri
    - name: OG_DB_URI
      value: "$(_PG_URI)?sslmode=verify-full"
    - name: PGSSLROOTCERT
      value: /postgres-ca/ca.crt
  envFromSecrets:
    - name: OG_OIDC_SECRET
      secretName: opengist-kanidm-oauth2-credentials
      secretKey: CLIENT_SECRET
    - name: OG_MEILI_API_KEY
      secretName: opengist-meilisearch
      secretKey: MEILI_MASTER_KEY

extraVolumes:
  - name: postgres-ca
    secret:
      secretName: opengist-postgres-ca

extraVolumeMounts:
  - name: postgres-ca
    mountPath: /postgres-ca
    readOnly: true

meilisearch:
  enabled: true
  environment:
    MEILI_ENV: production
  auth:
    existingMasterKeySecret: opengist-meilisearch
  podAnnotations:
    secret.reloader.stakater.com/reload: "opengist-meilisearch"
