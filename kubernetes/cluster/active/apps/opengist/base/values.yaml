---
defaultPodOptions:
  securityContext:
    runAsUser: 0
    runAsGroup: 1000
    runAsNonRoot: false
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
controllers:
  opengist:
    strategy: Recreate
    containers:
      app:
        image:
          repository: ghcr.io/thomiceli/opengist
          tag: 1.12.2@sha256:5cdaaeaf2d73a9c87100fed850416bc258e5ef1fe5208cfa9153f992a6285be5
        command:
          - ./opengist
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - DAC_OVERRIDE
        resources:
          requests:
            cpu: 100m
            memory: 52M
          limits:
            memory: 256M
service:
  app:
    controller: opengist
    ports:
      http:
        port: &port 6157
      ssh:
        port: 2222
persistence:
  data:
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: longhorn
    globalMounts:
      - path: /opengist
