---
global:
  createDefaultServiceAccount: true
defaultPodOptions:
  automountServiceAccountToken: false
controllers:
  bookorbit:
    pod:
      annotations:
        secret.reloader.stakater.com/reload: "bookorbit-postgres-app,bookorbit-postgres-ca,bookorbit-secrets,bookorbit-kanidm-oauth2-credentials"
        configmap.reloader.stakater.com/reload: "bookorbit-oidc"
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    initContainers:
      wait-for-postgres:
        image:
          repository: ghcr.io/wait4x/wait4x
          tag: 3.6.0@sha256:bec7ac18547781d854562c3729d3195c3880116d6758c49fdf4573ad58805f14
        args:
          - postgresql
          - $(POSTGRES_URI)?sslmode=verify-full&sslrootcert=/postgres-ca/ca.crt
        env:
          POSTGRES_URI:
            valueFrom:
              secretKeyRef:
                name: bookorbit-postgres-app
                key: uri
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            cpu: 10m
            memory: 32Mi
    containers:
      app:
        image:
          repository: ghcr.io/bookorbit/bookorbit
          tag: 2.0.1@sha256:70bef7bef8b0d0fa938c980b5a128f86bbde656cde04f4ab0549b9b91ebb2e14
        env:
          NODE_ENV: production
          PORT: &port 3000
          # Declared first so DATABASE_URL can reference it via $(DATABASE_CONN_URI)
          DATABASE_CONN_URI:
            valueFrom:
              secretKeyRef:
                name: bookorbit-postgres-app
                key: uri
          DATABASE_URL: "$(DATABASE_CONN_URI)?sslmode=verify-full&sslrootcert=/postgres-ca/ca.crt"
          JWT_SECRET:
            valueFrom:
              secretKeyRef:
                name: bookorbit-secrets
                key: JWT_SECRET
          SETUP_BOOTSTRAP_TOKEN:
            valueFrom:
              secretKeyRef:
                name: bookorbit-secrets
                key: SETUP_BOOTSTRAP_TOKEN
          EMAIL_ENCRYPTION_KEY:
            valueFrom:
              secretKeyRef:
                name: bookorbit-secrets
                key: EMAIL_ENCRYPTION_KEY
          MIGRATION_ENCRYPTION_KEY:
            valueFrom:
              secretKeyRef:
                name: bookorbit-secrets
                key: MIGRATION_ENCRYPTION_KEY
          # Public/external URL — used for OIDC redirect-URI validation
          # (${APP_URL}/oauth2-callback), password-reset links, and Kobo endpoints.
          # Must be the browser-facing origin, not the in-cluster Service URL.
          APP_URL: "https://books.${FQDN_01}"
          CLIENT_URL: "https://books.${FQDN_01}"
          # Kanidm (auth.${FQDN_01}) resolves to a private LAN address. In
          # production BookOrbit's SSRF guard blocks OIDC discovery to private
          # issuers, failing both the Test button and the real login flow with
          # PrivateAddressException. We trust the internal network, so allow it.
          OIDC_ALLOW_LOCAL_ISSUERS: "true"
          PUID: "1000"
          PGID: "1000"
          NODE_MAX_OLD_SPACE_SIZE: "2048"
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v1/health
                port: *port
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v1/health
                port: *port
              initialDelaySeconds: 20
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v1/health
                port: *port
              failureThreshold: 30
              periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 2Gi
service:
  app:
    ports:
      http:
        port: *port
persistence:
  books:
    type: persistentVolumeClaim
    existingClaim: smb-mediadata-rwx
    advancedMounts:
      bookorbit:
        app:
          - path: "/books"
            subPath: "Media/Books/BookOrbit"
          - path: "/data/book-dock"
            subPath: "Media/Books/.bookdrop/bookorbit"
  data:
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: longhorn
    advancedMounts:
      bookorbit:
        app:
          - path: /data
  postgres-ca:
    type: secret
    name: bookorbit-postgres-ca
    advancedMounts:
      bookorbit:
        app:
          - path: /postgres-ca
            readOnly: true
        wait-for-postgres:
          - path: /postgres-ca
            readOnly: true
  tmp:
    type: emptyDir
    advancedMounts:
      bookorbit:
        app:
          - path: /tmp
