---
controllers:
  grimmory:
    pod:
      annotations:
        secret.reloader.stakater.com/reload: "grimmory-mariadb-ca-bundle,grimmory-mariadb-user-password"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    initContainers:
      wait-for-mariadb:
        image:
          repository: ghcr.io/wait4x/wait4x
          tag: 3.6.0@sha256:bec7ac18547781d854562c3729d3195c3880116d6758c49fdf4573ad58805f14
        args:
          - mysql
          - grimmory:$(DATABASE_PASSWORD)@tcp(grimmory-mariadb.grimmory.svc.cluster.local:3306)/grimmory
        env:
          DATABASE_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: grimmory-mariadb-user-password
                key: password
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            cpu: 10m
            memory: 32Mi
    containers:
      app:
        image:
          repository: ghcr.io/grimmory-tools/grimmory
          tag: v3.0.3@sha256:a903a2b44c308bd1738b6f7cdb5a2e5a2a1ae23a092f30eb68581e2be1af50cd
        command:
          - java
        args:
          - --enable-native-access=ALL-UNNAMED
          - --enable-preview
          - -jar
          - /app/app.jar
        env:
          BOOKLORE_PORT: 6060
          DISK_TYPE: NETWORK
          DATABASE_URL: "jdbc:mariadb://grimmory-mariadb.grimmory.svc.cluster.local:3306/grimmory\
            ?sslMode=verify-full&serverSslCert=/tls/ca.crt\
            &connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true"
          DATABASE_USERNAME: grimmory
          DATABASE_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: grimmory-mariadb-user-password
                key: password
          SWAGGER_ENABLED: "false"
          TZ: Asia/Jerusalem
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v1/healthcheck
                port: 6060
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v1/healthcheck
                port: 6060
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v1/healthcheck
                port: 6060
              failureThreshold: 30
              periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 50m
            memory: 1Gi
          limits:
            memory: 2Gi
service:
  app:
    ports:
      http:
        port: 6060
persistence:
  data:
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: longhorn
    advancedMounts:
      grimmory:
        app:
          - path: /app/data
  tmpfs:
    type: emptyDir
    advancedMounts:
      grimmory:
        app:
          - path: /tmp
  tls:
    type: secret
    name: grimmory-mariadb-ca-bundle
    advancedMounts:
      grimmory:
        app:
          - path: /tls
            readOnly: true
