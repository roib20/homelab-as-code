---
global:
  createDefaultServiceAccount: true
defaultPodOptions:
  automountServiceAccountToken: false
controllers:
  bookboss:
    pod:
      annotations:
        secret.reloader.stakater.com/reload: "bookboss-kanidm-oauth2-credentials,bookboss-postgres-app,bookboss-postgres-ca,bookboss-secrets"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    initContainers:
      wait-for-postgres:
        image:
          repository: ghcr.io/wait4x/wait4x
          tag: 3.6.0@sha256:bec7ac18547781d854562c3729d3195c3880116d6758c49fdf4573ad58805f14
        args:
          - postgresql
          - $(DATABASE_CONN_URI)?sslmode=verify-full&sslrootcert=/postgres-ca/ca.crt
        env:
          DATABASE_CONN_URI:
            valueFrom:
              secretKeyRef:
                name: bookboss-postgres-app
                key: uri
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            cpu: 10m
            memory: 32Mi
    containers:
      app:
        image:
          repository: ghcr.io/szinn/bookboss
          tag: v0.8.28
        env:
          # Declared before DATABASE_URL so $(BOOKBOSS__DATABASE__DATABASE_CONN_URI) expands correctly
          BOOKBOSS__DATABASE__DATABASE_CONN_URI:
            valueFrom:
              secretKeyRef:
                name: bookboss-postgres-app
                key: uri
          BOOKBOSS__DATABASE__DATABASE_URL: "$(BOOKBOSS__DATABASE__DATABASE_CONN_URI)?sslmode=verify-full&sslrootcert=/postgres-ca/ca.crt"
          BOOKBOSS__ENCRYPTION_SECRET:
            valueFrom:
              secretKeyRef:
                name: bookboss-secrets
                key: BOOKBOSS__ENCRYPTION_SECRET
          BOOKBOSS__FRONTEND__BASE_URL: "https://bookboss.${FQDN_01}"
          BOOKBOSS__FRONTEND__LISTEN_PORT: "8080"
          BOOKBOSS__IMPORT__BOOKDROP_PATH: "/library/bookdrop"
          BOOKBOSS__IMPORT__POLL_INTERVAL_SECS: "60"
          BOOKBOSS__IMPORT__WORKER_POLL_INTERVAL_SECS: "5"
          BOOKBOSS__LIBRARY__LIBRARY_PATH: "/library/books"
          BOOKBOSS__METADATA__GOOGLEBOOKS_API_TOKEN:
            valueFrom:
              secretKeyRef:
                name: bookboss-secrets
                key: BOOKBOSS__METADATA__GOOGLEBOOKS_API_TOKEN
          BOOKBOSS__METADATA__HARDCOVER_API_TOKEN:
            valueFrom:
              secretKeyRef:
                name: bookboss-secrets
                key: BOOKBOSS__METADATA__HARDCOVER_API_TOKEN
          BOOKBOSS__OIDC__BUTTON_LABEL: "Sign in with Kanidm"
          # CLIENT_ID declared before DISCOVERY_URL so $(BOOKBOSS__OIDC__CLIENT_ID) expands correctly
          BOOKBOSS__OIDC__CLIENT_ID:
            valueFrom:
              secretKeyRef:
                name: bookboss-kanidm-oauth2-credentials
                key: CLIENT_ID
          BOOKBOSS__OIDC__CLIENT_SECRET:
            valueFrom:
              secretKeyRef:
                name: bookboss-kanidm-oauth2-credentials
                key: CLIENT_SECRET
          BOOKBOSS__OIDC__DISCOVERY_URL: "https://auth.placeholder/oauth2/openid/$(BOOKBOSS__OIDC__CLIENT_ID)/.well-known/openid-configuration"
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8080
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: 8080
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8080
              failureThreshold: 30
              periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            memory: 512Mi
service:
  app:
    ports:
      http:
        port: 8080
persistence:
  library:
    type: persistentVolumeClaim
    existingClaim: smb-mediadata-rwx
    advancedMounts:
      bookboss:
        app:
          - path: "/library/books"
            subPath: "Media/Books/BookBoss Library"
          - path: "/library/bookdrop"
            subPath: "Media/Books/.bookdrop/bookboss"
  postgres-ca:
    type: secret
    name: bookboss-postgres-ca
    advancedMounts:
      bookboss:
        app:
          - path: /postgres-ca
            readOnly: true
        wait-for-postgres:
          - path: /postgres-ca
            readOnly: true
  tmp:
    type: emptyDir
    advancedMounts:
      bookboss:
        app:
          - path: /tmp
