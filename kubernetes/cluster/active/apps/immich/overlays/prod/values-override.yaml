---
defaultPodOptions:
  annotations:
    secret.reloader.stakater.com/reload: "immich-cnpg-app,immich-cnpg-ca"

controllers:
  main:
    containers:
      main:
        securityContext: &immichCommonSecurityContext
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          privileged: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            add: []
            drop:
              - ALL
        env: &immichCommonEnv
          REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
          IMMICH_MACHINE_LEARNING_URL: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'
          DATABASE_CONN_URI:
            valueFrom:
              secretKeyRef:
                name: immich-cnpg-app
                key: uri
          DB_URL: "$(DATABASE_CONN_URI)?sslmode=verify-full&sslrootcert=/postgres-ca/ca.crt"
          DB_VECTOR_EXTENSION: vectorchord
          IMMICH_ALLOW_SETUP: false
          UPLOAD_LOCATION: /data
          THUMB_LOCATION: /data/thumbs
          ENCODED_VIDEO_LOCATION: /data/encoded-video
          PROFILE_LOCATION: /data/profile
          BACKUP_LOCATION: /data/backups

server:
  enabled: true
  controllers:
    main:
      pod:
        securityContext: &immichPodSecurityContext
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
      containers:
        main:
          env:
            IMMICH_HOST: 0.0.0.0
            IMMICH_WORKERS_INCLUDE: api
    microservices:
      type: deployment
      pod:
        securityContext: *immichPodSecurityContext
        affinity: &gpuNodeAffinity
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: NotIn
                      values:
                        - control-plane-01
        resourceClaims: &gpuPodClaims
          - name: gpu
            resourceClaimTemplateName: immich-gpu-claim
      containers:
        main:
          env:
            <<: *immichCommonEnv
            IMMICH_WORKERS_EXCLUDE: api
          ports:
            - name: metrics-ms
              containerPort: 8082
              protocol: TCP
          probes:
            readiness:
              enabled: true
              custom: true
              spec:
                exec:
                  command:
                    - immich-healthcheck
            liveness:
              enabled: true
              custom: true
              spec:
                exec:
                  command:
                    - immich-healthcheck
            startup:
              enabled: true
              custom: true
              spec:
                exec:
                  command:
                    - immich-healthcheck
          securityContext: *immichCommonSecurityContext
          resources:
            claims: &gpuContainerClaims
              - name: gpu
  service:
    microservices:
      enabled: true
      controller: microservices
      type: ClusterIP
      ports:
        metrics-ms:
          enabled: true
          port: 8082
          targetPort: metrics-ms
          protocol: TCP
          appProtocol: http
  serviceMonitor:
    main:
      selector:
        matchLabels:
          app.kubernetes.io/instance: immich
          app.kubernetes.io/name: server
      endpoints:
        - port: metrics-api
          scheme: http
          relabelings:
            - action: keep
              sourceLabels:
                - __meta_kubernetes_service_name
              regex: '{{ printf "%s-server-main" .Release.Name }}'
        - port: metrics-ms
          scheme: http
          relabelings:
            - action: keep
              sourceLabels:
                - __meta_kubernetes_service_name
              regex: '{{ printf "%s-server-microservices" .Release.Name }}'
  persistence:
    data:
      existingClaim: smb-imagedata-rwx
      # Create directories in advance on the mounted SMB share:
      # `mkdir -p "immich/data" "immich/external-libraries"`
      globalMounts:
        - path: "/data"
          subPath: "immich/data"
        - path: "/external-libraries"
          subPath: "immich/external-libraries"
          readOnly: true
    thumbs:
      enabled: true
      type: persistentVolumeClaim
      storageClass: longhorn
      accessMode: ReadWriteMany
      size: 20Gi
      globalMounts:
        - path: /data/thumbs
    profile:
      enabled: true
      type: persistentVolumeClaim
      storageClass: longhorn
      accessMode: ReadWriteMany
      size: 1Gi
      globalMounts:
        - path: /data/profile
    postgres-ca:
      type: secret
      name: immich-cnpg-ca
      globalMounts:
        - path: /postgres-ca
          readOnly: true
  rawResources:
    http-route:
      forceRename: immich
      manifest:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          annotations:
            gethomepage.dev/enabled: "true"
            gethomepage.dev/description: Self-hosted photo and video backup solution.
            gethomepage.dev/group: Media
            gethomepage.dev/icon: immich.svg
            gethomepage.dev/name: Immich
            gethomepage.dev/pod-selector: "app.kubernetes.io/instance=immich"
            gethomepage.dev/widget.type: "immich"
            gethomepage.dev/widget.url: "http://immich-server-main.immich.svc.cluster.local:2283"
            gethomepage.dev/widget.key: "{{`{{HOMEPAGE_VAR_IMMICH_KEY}}`}}"
            gethomepage.dev/widget.version: "2"
        spec:
          parentRefs:
            - group: gateway.networking.k8s.io
              kind: Gateway
              name: http-gateway-api
              namespace: envoy-gateway-ingress
          hostnames:
            - "gallery.${FQDN_01}"
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /
              backendRefs:
                - group: ""
                  kind: Service
                  name: immich-server-main
                  namespace: immich
                  port: 2283
                  weight: 1
              timeouts:
                request: 600s
            - matches:
                - path:
                    type: Exact
                    value: /.well-known/immich
              backendRefs:
                - group: ""
                  kind: Service
                  name: immich-server-main
                  namespace: immich
                  port: 2283
                  weight: 1
              timeouts:
                request: 600s
    smb-imagedata-rwx-pvc:
      forceRename: smb-imagedata-rwx
      manifest:
        apiVersion: v1
        kind: PersistentVolumeClaim
        spec:
          accessModes:
            - ReadWriteMany
          storageClassName: smb-imagedata
          resources:
            requests:
              storage: 10Ti
    gpu-claim-template:
      forceRename: immich-gpu-claim
      manifest:
        apiVersion: resource.k8s.io/v1
        kind: ResourceClaimTemplate
        spec:
          spec:
            devices:
              requests:
                - name: gpu
                  exactly:
                    allocationMode: ExactCount
                    count: 1
                    deviceClassName: gpu.intel.com
    cnpg-cluster:
      forceRename: immich-cnpg
      manifest:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        spec:
          instances: 2
          storage:
            size: 10Gi
            storageClass: longhorn-cnpg
          imageName: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie
          postgresql:
            pg_hba:
              - hostssl immich immich all scram-sha-256
              - host immich immich all reject
            shared_preload_libraries:
              - "vchord.so"
            extensions:
              - name: vchord
                image:
                  reference: ghcr.io/tensorchord/vchord-scratch:pg18-v1.1.1
                dynamic_library_path:
                  - /usr/lib/postgresql/18/lib
                extension_control_path:
                  - /usr/share/postgresql/18/
          bootstrap:
            initdb:
              database: immich
              owner: immich
          managed:
            services:
              disabledDefaultServices:
                - ro
                - r
          affinity:
            enablePodAntiAffinity: true
            topologyKey: kubernetes.io/hostname
            podAntiAffinityType: required
    cnpg-database:
      forceRename: immich-database
      manifest:
        apiVersion: postgresql.cnpg.io/v1
        kind: Database
        spec:
          name: immich
          owner: immich
          cluster:
            name: immich-cnpg
          extensions:
            - ensure: present
              name: vector
            - ensure: present
              name: vchord
              version: 1.1.1
            - ensure: present
              name: cube
            - ensure: present
              name: earthdistance

immich:
  persistence:
    library:
      existingClaim: smb-imagedata-rwx

valkey:
  enabled: true
  controllers:
    main:
      pod:
        securityContext: &valkeyPodSecurityContext
          fsGroup: 999
          fsGroupChangePolicy: OnRootMismatch
      containers:
        main:
          securityContext: &valkeyContainerSecurityContext
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            privileged: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              add: []
              drop:
                - ALL
  persistence:
    data:
      enabled: true
      size: 1Gi
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      storageClass: longhorn

machine-learning:
  enabled: true
  controllers:
    main:
      pod:
        securityContext: *immichPodSecurityContext
        affinity: *gpuNodeAffinity
        resourceClaims: *gpuPodClaims
      containers:
        main:
          workingDir: /tmp
          env:
            HOME: /tmp
          resources:
            claims: *gpuContainerClaims
