---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - resources/cloudnative-pg.yaml
  - resources/pvc-immich-library.yaml
  - resources/resource-claim-template.yaml
patches:
  - path: patches/deployment-patches.yaml
helmCharts:
  - name: immich
    repo: oci://ghcr.io/immich-app/immich-charts
    version: 0.10.3
    releaseName: immich
    namespace: immich
    valuesFile: ../../base/values.yaml
    additionalValuesFiles:
      - values-override.yaml
    includeCRDs: true
