---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
helmCharts:
  - name: immich
    repo: oci://ghcr.io/immich-app/immich-charts
    version: 0.13.1
    releaseName: immich
    namespace: immich
    valuesFile: ../../base/values.yaml
    additionalValuesFiles:
      - values-override.yaml
      - values-immich-config.yaml
    includeCRDs: true
configMapGenerator:
  - name: env-vars-immich
    envs:
      - /tmp/env-vars.env
replacements:
  - path: replacements.yaml
