---
defaultPodOptions:
  annotations:
    secret.reloader.stakater.com/reload: "immich-cnpg-app,,immich-cnpg-ca,immich-config,immich-kanidm-oauth2-credentials"

immich:
  configurationKind: Secret
  existingConfiguration: immich-config

server:
  rawResources:
    immich-kubernetes-secretstore-serviceaccount:
      forceRename: immich-kubernetes-secretstore
      manifest:
        apiVersion: v1
        kind: ServiceAccount
        automountServiceAccountToken: false

    immich-kubernetes-secretstore:
      forceRename: immich-kubernetes-secretstore
      manifest:
        apiVersion: external-secrets.io/v1
        kind: SecretStore
        spec:
          provider:
            kubernetes:
              remoteNamespace: immich
              server:
                caProvider:
                  type: ConfigMap
                  name: kube-root-ca.crt
                  key: ca.crt
              auth:
                serviceAccount:
                  name: immich-kubernetes-secretstore

    immich-kubernetes-secretstore-role:
      forceRename: immich-kubernetes-secretstore
      manifest:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        rules:
          - apiGroups: [""]
            resources: ["secrets"]
            resourceNames: ["immich-kanidm-oauth2-credentials", "env-vars"]
            verbs: ["get"]
          - apiGroups: ["authorization.k8s.io"]
            resources: ["selfsubjectrulesreviews"]
            verbs: ["create"]

    immich-kubernetes-secretstore-rolebinding:
      forceRename: immich-kubernetes-secretstore
      manifest:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: Role
          name: immich-kubernetes-secretstore
        subjects:
          - kind: ServiceAccount
            name: immich-kubernetes-secretstore
            namespace: immich

    env-vars:
      forceRename: env-vars
      manifest:
        apiVersion: v1
        kind: Secret
        stringData:
          FQDN_01: "${FQDN_01}"

    immich-config:
      forceRename: immich-config
      manifest:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        spec:
          refreshInterval: 1h
          secretStoreRef:
            name: immich-kubernetes-secretstore
            kind: SecretStore
          target:
            name: immich-config
            creationPolicy: Owner
            template:
              engineVersion: v2
              type: Opaque
              data:
                immich-config.yaml: |
                  backup:
                    database:
                      cronExpression: "0 02 * * *"
                      enabled: true
                      keepLastAmount: 14
                  ffmpeg:
                    accel: "qsv"
                    accelDecode: true
                    acceptedAudioCodecs:
                      - "aac"
                      - "mp3"
                      - "opus"
                    acceptedContainers:
                      - "mov"
                      - "ogg"
                      - "webm"
                    acceptedVideoCodecs:
                      - "h264"
                    bframes: -1
                    cqMode: "auto"
                    crf: 23
                    gopSize: 0
                    maxBitrate: "0"
                    preferredHwDevice: "auto"
                    preset: "medium"
                    realtime:
                      enabled: true
                      resolutions:
                        - 480
                        - 720
                        - 1080
                        - 1440
                        - 2160
                      videoCodecs:
                        - "h264"
                        - "hevc"
                    refs: 0
                    targetAudioCodec: "opus"
                    targetResolution: "1080"
                    targetVideoCodec: "h264"
                    temporalAQ: false
                    threads: 0
                    tonemap: "hable"
                    transcode: "disabled"
                    twoPass: false
                  integrityChecks:
                    checksumFiles:
                      cronExpression: "0 03 * * *"
                      enabled: true
                      percentageLimit: 1
                      timeLimit: 3600000
                    missingFiles:
                      cronExpression: "0 03 * * *"
                      enabled: true
                    untrackedFiles:
                      cronExpression: "0 03 * * *"
                      enabled: true
                  image:
                    colorspace: "p3"
                    extractEmbedded: false
                    fullsize:
                      enabled: false
                      format: "jpeg"
                      progressive: false
                      quality: 80
                    preview:
                      format: "jpeg"
                      progressive: false
                      quality: 80
                      size: 1440
                    thumbnail:
                      format: "webp"
                      progressive: false
                      quality: 80
                      size: 250
                  job:
                    backgroundTask:
                      concurrency: 5
                    editor:
                      concurrency: 2
                    faceDetection:
                      concurrency: 2
                    integrityCheck:
                      concurrency: 1
                    library:
                      concurrency: 5
                    metadataExtraction:
                      concurrency: 5
                    migration:
                      concurrency: 5
                    notifications:
                      concurrency: 5
                    ocr:
                      concurrency: 1
                    search:
                      concurrency: 5
                    sidecar:
                      concurrency: 5
                    smartSearch:
                      concurrency: 2
                    thumbnailGeneration:
                      concurrency: 3
                    videoConversion:
                      concurrency: 1
                    workflow:
                      concurrency: 1
                  library:
                    scan:
                      cronExpression: "0 0 * * *"
                      enabled: true
                    watch:
                      enabled: false
                  logging:
                    enabled: true
                    level: "log"
                  machineLearning:
                    availabilityChecks:
                      enabled: true
                      interval: 30000
                      timeout: 2000
                    clip:
                      enabled: true
                      modelName: "ViT-B-32__openai"
                    duplicateDetection:
                      enabled: true
                      maxDistance: 0.01
                    enabled: true
                    facialRecognition:
                      enabled: true
                      maxDistance: 0.5
                      minFaces: 3
                      minScore: 0.7
                      modelName: "buffalo_l"
                    ocr:
                      enabled: true
                      maxResolution: 736
                      minDetectionScore: 0.5
                      minRecognitionScore: 0.8
                      modelName: "PP-OCRv5_mobile"
                    urls:
                      - "http://immich-machine-learning:3003"
                  map:
                    darkStyle: "https://tiles.immich.cloud/v1/style/dark.json"
                    enabled: true
                    lightStyle: "https://tiles.immich.cloud/v1/style/light.json"
                  metadata:
                    faces:
                      import: false
                  newVersionCheck:
                    channel: "stable"
                    enabled: true
                  nightlyTasks:
                    clusterNewFaces: true
                    databaseCleanup: true
                    generateMemories: true
                    missingThumbnails: true
                    startTime: "00:00"
                    syncQuotaUsage: true
                  notifications:
                    smtp:
                      enabled: false
                      from: ""
                      replyTo: ""
                      transport:
                        host: ""
                        ignoreCert: false
                        password: ""
                        port: 587
                        secure: false
                        username: ""
                  oauth:
                    allowInsecureRequests: false
                    autoLaunch: true
                    autoRegister: true
                    buttonText: "Login with Kanidm"
                    clientId: '{{ printf "{{ .CLIENT_ID }}" }}'
                    clientSecret: '{{ printf "{{ .CLIENT_SECRET }}" }}'
                    defaultStorageQuota: null
                    enabled: true
                    endSessionEndpoint: ""
                    issuerUrl: 'https://auth.{{ printf "{{ .FQDN_01 }}" }}/oauth2/openid/{{ printf "{{ .CLIENT_ID }}" }}/.well-known/openid-configuration'
                    mobileOverrideEnabled: false
                    mobileRedirectUri: 'https://photos.{{ printf "{{ .FQDN_01 }}" }}/api/oauth/mobile-redirect'
                    profileSigningAlgorithm: "ES256"
                    prompt: ""
                    roleClaim: "immich_role"
                    scope: "openid email profile"
                    signingAlgorithm: "ES256"
                    storageLabelClaim: "preferred_username"
                    storageQuotaClaim: "immich_quota"
                    timeout: 30000
                    tokenEndpointAuthMethod: "client_secret_post"
                  passwordLogin:
                    enabled: false
                  reverseGeocoding:
                    enabled: true
                  server:
                    externalDomain: ""
                    loginPageMessage: ""
                    publicUsers: true
                  storageTemplate:
                    enabled: false
                    hashVerificationEnabled: true
                    template: '{{ printf "{{ \"{{\" }}y{{ \"}}\" }}/{{ \"{{\" }}y{{ \"}}\" }}-{{ \"{{\" }}MM{{ \"}}\" }}-{{ \"{{\" }}dd{{ \"}}\" }}/{{ \"{{\" }}filename{{ \"}}\" }}" }}'
                  templates:
                    email:
                      albumInviteTemplate: ""
                      albumUpdateTemplate: ""
                      welcomeTemplate: ""
                  theme:
                    customCss: ""
                  trash:
                    days: 30
                    enabled: true
                  user:
                    deleteDelay: 7
          data:
            - secretKey: CLIENT_ID
              remoteRef:
                conversionStrategy: Default
                decodingStrategy: None
                key: immich-kanidm-oauth2-credentials
                metadataPolicy: None
                property: CLIENT_ID
            - secretKey: CLIENT_SECRET
              remoteRef:
                conversionStrategy: Default
                decodingStrategy: None
                key: immich-kanidm-oauth2-credentials
                metadataPolicy: None
                property: CLIENT_SECRET
            - secretKey: FQDN_01
              remoteRef:
                conversionStrategy: Default
                decodingStrategy: None
                key: env-vars
                metadataPolicy: None
                property: FQDN_01
