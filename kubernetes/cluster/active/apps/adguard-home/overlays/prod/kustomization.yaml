---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - resources/cilium-l2.yaml
helmCharts:
  - name: adguard-home
    repo: oci://ghcr.io/gabe565/charts
    version: 0.3.25
    releaseName: adguard-home
    namespace: adguard-home
    valuesFile: ../../base/values.yaml
    additionalValuesFiles:
      - values-override.yaml
      - values-adguard-home-config.yaml
    includeCRDs: true
configMapGenerator:
  - name: env-vars
    envs:
      - /tmp/env-vars.env
replacements:
  - path: replacements.yaml
