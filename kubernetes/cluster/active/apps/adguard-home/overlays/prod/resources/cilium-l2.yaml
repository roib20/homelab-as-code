---
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: adguard-home-dns-pool
spec:
  blocks:
    - start: 192.168.1.53
      stop: 192.168.1.53
  serviceSelector:
    matchLabels:
      io.kubernetes.service.namespace: adguard-home
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: adguard-home-dns-l2-policy
spec:
  serviceSelector:
    matchLabels:
      io.kubernetes.service.namespace: adguard-home
  interfaces:
    - ^ens18$
  loadBalancerIPs: true
