---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - resources/httproute.yaml
  - resources/request-authentication.yaml
  - resources/authz-custom.yaml
  - resources/authz-allow-group.yaml
helmCharts:
  - name: cyberchef
    repo: oci://oci.trueforge.org/truecharts
    version: 13.0.1
    releaseName: cyberchef
    namespace: cyberchef
    valuesFile: ../../base/values.yaml
    additionalValuesFiles:
      - values-override.yaml
    includeCRDs: true
configMapGenerator:
  - name: env-vars
    envs:
      - /tmp/env-vars.env
  - name: cyberchef-oidc
    literals:
      - AUTH_HOST=auth.${FQDN_01}
      - CYBERCHEF_HOST=cyberchef.${FQDN_01}
    options:
      disableNameSuffixHash: true
replacements:
  - path: replacements.yaml
