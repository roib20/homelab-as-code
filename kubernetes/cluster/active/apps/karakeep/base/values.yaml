---
controllers:
  chrome:
    containers:
      chrome:
        args:
          - --remote-debugging-address=0.0.0.0
          - --remote-debugging-port=9222
          - --headless
          - --hide-scrollbars
          - --disable-gpu
          - --disable-dev-shm-usage
          - --no-sandbox
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add: []
            drop:
              - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
  karakeep:
    containers:
      karakeep:
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              initialDelaySeconds: 10
              httpGet:
                path: /api/health
                port: 3000
          readiness:
            enabled: true
            custom: true
            spec:
              initialDelaySeconds: 10
              httpGet:
                path: /api/health
                port: 3000
ingress:
  karakeep:
    enabled: false
