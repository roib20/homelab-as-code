---
controllers:
  chrome:
    containers:
      chrome:
        args:
          - --remote-debugging-address=0.0.0.0
          - --remote-debugging-port=9222
          - --headless
          - --hide-scrollbars
          - --disable-gpu
          - --disable-dev-shm-usage
          - --no-sandbox
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add: []
            drop:
              - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
ingress:
  karakeep:
    enabled: false
