---
controllers:
  chrome:
    containers:
      chrome:
        args:
          - --remote-debugging-address=0.0.0.0
          - --remote-debugging-port=9222
          - --headless
          - --hide-scrollbars
          - --disable-gpu
          - --disable-dev-shm-usage
          - --no-sandbox
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add: []
            drop:
              - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
  karakeep:
    containers:
      karakeep:
        env:
          DB_WAL_MODE: true
          S6_READ_ONLY_ROOT: 1
          S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: 1
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              initialDelaySeconds: 10
              httpGet:
                path: /api/health
                port: 3000
          readiness:
            enabled: true
            custom: true
            spec:
              initialDelaySeconds: 10
              httpGet:
                path: /api/health
                port: 3000
defaultPodOptions:
  hostUsers: false
  securityContext:
    runAsGroup: 1000
    runAsUser: 1000
    runAsNonRoot: true
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
ingress:
  karakeep:
    enabled: false
persistence:
  run:
    type: emptyDir
    advancedMounts:
      karakeep:
        karakeep:
          - path: /run
