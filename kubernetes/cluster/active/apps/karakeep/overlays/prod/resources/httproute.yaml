---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: karakeep
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: http-gateway-api
      namespace: envoy-gateway-ingress
  hostnames:
    - "karakeep.${FQDN_01}"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: karakeep
          namespace: karakeep
          port: 3000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
