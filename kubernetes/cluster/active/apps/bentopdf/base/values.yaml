---
controllers:
  main:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/alam00000/bentopdf-simple
          tag: 2.8.3@sha256:be4953890f441b92f008fe4caf2136dbd5c27d5424f8b2b81329a4345576e69d
        env:
          TZ: Asia/Jerusalem
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: &port 8080
              periodSeconds: 5
              timeoutSeconds: 3
              failureThreshold: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *port
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *port
              periodSeconds: 30
              timeoutSeconds: 3
              failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 256Mi
defaultPodOptions:
  automountServiceAccountToken: false
  enableServiceLinks: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
service:
  app:
    ports:
      http:
        targetPort: *port
        port: *port
persistence:
  tmp:
    type: emptyDir
    medium: Memory
    sizeLimit: 32Mi
    globalMounts:
      - subPath: cache
        path: /var/cache/nginx
      - subPath: etc-tmp
        path: /etc/nginx/tmp
      - subPath: var-tmp
        path: /var/lib/nginx/tmp
