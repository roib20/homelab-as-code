---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: it-tools-authservice
  namespace: istio-ingress
spec:
  selector:
    matchLabels:
      app: istio-ingressgateway
  action: CUSTOM
  provider:
    name: authservice-grpc
  rules:
    - to:
        - operation:
            hosts:
              - it-tools.${FQDN_01}
