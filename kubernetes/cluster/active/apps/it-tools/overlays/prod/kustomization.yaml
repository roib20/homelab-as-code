---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - resources/httproute.yaml
  # - resources/request-authentication.yaml
  # - resources/authz-custom.yaml
  # - resources/authz-allow-group.yaml
  # - resources/authservice/it-tools-client-secret.yaml.externalsecret
  # - resources/authservice/it-tools-kubernetes-secret-store.yaml
helmCharts:
  - name: it-tools
    repo: oci://oci.trueforge.org/truecharts
    version: 9.0.2
    releaseName: it-tools
    namespace: it-tools
    valuesFile: ../../base/values.yaml
    additionalValuesFiles:
      - values-override.yaml
    includeCRDs: true
configMapGenerator:
  - name: env-vars
    envs:
      - /tmp/env-vars.env
  - name: it-tools-oidc
    literals:
      - AUTH_HOST=auth.${FQDN_01}
      - it-tools_HOST=it-tools.${FQDN_01}
    options:
      disableNameSuffixHash: true
replacements:
  - path: replacements.yaml
