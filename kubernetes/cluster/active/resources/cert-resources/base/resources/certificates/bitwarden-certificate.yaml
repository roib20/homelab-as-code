---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bitwarden-tls-certs
  namespace: bitwarden
spec:
  secretName: bitwarden-tls-certs
  dnsNames:
    - bitwarden-sdk-server.bitwarden.svc.cluster.local
    - external-secrets-bitwarden-sdk-server.bitwarden.svc.cluster.local
    - localhost
  duration: 2160h
  ipAddresses:
    - 127.0.0.1
    - ::1
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: bitwarden-certificate-issuer
