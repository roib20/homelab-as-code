---
# Coraza WAF - Web Application Firewall for Istio Ingress Gateway
#
# Uses OWASP Core Rule Set (CRS) to protect against common web attacks:
# - SQL Injection (942xxx)
# - Cross-Site Scripting (941xxx)
# - Remote Code Execution (932xxx)
# - Local File Inclusion (930xxx)
# - And more...
#
# Rule Exclusions:
# The following rules are disabled due to false positives in this environment:
#
# | Rule ID | Name                    | Reason                                          |
# |---------|-------------------------|-------------------------------------------------|
# | 200002  | Multipart Parse EOF     | Multipart upload false positives across services |
# | 911100  | Method Enforcement      | REST APIs need DELETE/PATCH (Jellyfin, Immich)  |
# | 920274  | Invalid Header Chars    | Cloudflare cf-visitor and Envoy headers         |
# | 920430  | HTTP Protocol Version   | Istio/Envoy uses HTTP/2 internally              |
# | 930120  | OS File Access (LFI)    | ProfileImageHash contains .Profile (Jellyfin)   |
# | 941160  | XSS HTML Injection      | SSO login form contains legitimate <form> tag   |
#
# Endpoint-specific exclusions:
# - Renovate webhook path removes selected 932xxx/941180 signatures to avoid
#   false positives from dependency dashboard markdown content.
# - Outline auth config endpoint removes 920440 false positive on `.config` path.
# - Jellyfin image endpoint removes 920420 content-type false positive.
#
apiVersion: extensions.istio.io/v1alpha1
kind: WasmPlugin
metadata:
  name: coraza-waf
spec:
  imagePullPolicy: IfNotPresent
  phase: AUTHN
  pluginConfig:
    default_directives: default
    directives_map:
      default:
        - Include @demo-conf
        - SecDebugLogLevel 9
        - SecRuleEngine On
        # Endpoint-specific runtime exclusions must execute before CRS includes.
        # Outline auth config false positive (920440: restricted file extension)
        - SecRule REQUEST_METHOD "@streq POST" "id:100002,phase:1,pass,nolog,chain"
        - SecRule REQUEST_FILENAME "@streq /api/auth.config" "ctl:ruleRemoveById=920440"
        # Jellyfin image fetch false positive (920420: request content type policy)
        - SecRule REQUEST_METHOD "@streq GET" "id:100004,phase:1,pass,nolog,chain"
        - SecRule REQUEST_FILENAME "@rx ^/Items/[A-Za-z0-9]+/Images/Primary$" "ctl:ruleRemoveById=920420"
        - Include @crs-setup-conf
        - Include @owasp_crs/*.conf
        # --- Rule Exclusions ---
        # 200002: multipart request-body parse false positives
        - SecRuleRemoveById 200002
        # 911100: Method enforcement - REST APIs need DELETE/PATCH/PUT
        - SecRuleRemoveById 911100
        # 920274: Invalid header chars - Cloudflare cf-visitor and Envoy headers
        - SecRuleRemoveById 920274
        # 920430: HTTP protocol version - Istio/Envoy uses HTTP/2 internally
        - SecRuleRemoveById 920430
        # 930120: LFI - matches legitimate field names like .Profile
        - SecRuleRemoveById 930120
        # 941160: XSS - matches legitimate HTML in forms
        - SecRuleRemoveById 941160
        # Renovate webhook false positives (scoped by path + query args)
        - SecRule REQUEST_FILENAME "@streq /webhook/v1/github" "id:100001,phase:1,pass,nolog,chain"
        - SecRule ARGS:namespace "@streq renovate" "chain"
        - SecRule ARGS:job "@streq renovate-github" "ctl:ruleRemoveById=932230,ctl:ruleRemoveById=932235,ctl:ruleRemoveById=932250,ctl:ruleRemoveById=932260,ctl:ruleRemoveById=932370,ctl:ruleRemoveById=941180"
  selector:
    matchLabels:
      app: istio-ingressgateway
  url: oci://ghcr.io/corazawaf/coraza-proxy-wasm
