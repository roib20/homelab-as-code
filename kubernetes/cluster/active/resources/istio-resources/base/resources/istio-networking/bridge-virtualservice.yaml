---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: bridge-virtualservice
spec:
  hosts:
    - "*"
  gateways:
    - tls-gateway
  http:
    - match:
        - headers:
            ":authority":
              regex: "(.*)"
      route:
        # # Routing protected by Anubis
        # - destination:
        #     host: anubis.anubis.svc.cluster.local
        #     port:
        #       number: 8923
        # Direct routing with TLS termination
        - destination:
            host: istio-ingressgateway.istio-ingress.svc.cluster.local
            port:
              number: 80
          headers:
            request:
              set:
                x-forwarded-proto: "https"
                # Use downstream remote address for X-Real-IP (tunnel client IP)
                x-forwarded-for: "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
                x-real-ip: "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
                # Ensure Cloudflare IP is preserved if available
                cf-connecting-ip: "%REQ(CF-Connecting-IP)%"
