---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: coraza-proxy-wasm
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: http-gateway-api
  wasm:
    - name: wasm-filter
      failOpen: false
      rootID: waf
      code:
        type: Image
        image:
          url: ghcr.io/corazawaf/coraza-proxy-wasm:0.6.0
          sha256: 65d6009b9da2e8965e592a08b74a86725435fc01aa39c756dce0bd5ea64b3f4e
      config:
        default_directives: default
        directives_map:
          default:
            - Include @recommended-conf
            - SecDebugLogLevel 9
            - SecRuleEngine On
            - SecResponseBodyAccess Off
            # Endpoint-specific runtime exclusions must execute before CRS includes.
            # Outline auth config false positive (920440: restricted file extension)
            - SecRule REQUEST_METHOD "@streq POST" "id:100002,phase:1,pass,nolog,chain"
            - SecRule REQUEST_FILENAME "@streq /api/auth.config" "ctl:ruleRemoveById=920440"
            # Jellyfin image fetch false positive (920420: request content type policy)
            - SecRule REQUEST_METHOD "@streq GET" "id:100004,phase:1,pass,nolog,chain"
            - SecRule REQUEST_FILENAME "@rx ^/Items/[A-Za-z0-9]+/Images/Primary$" "ctl:ruleRemoveById=920420"
            # Jellyfin client log upload posts free-form log text that trips RCE/injection rules; do not buffer/inspect the body.
            - SecRule REQUEST_METHOD "@streq POST" "id:100013,phase:1,pass,nolog,chain"
            - SecRule REQUEST_HEADERS:Host "@rx ^media\." "chain"
            - SecRule REQUEST_FILENAME "@streq /ClientLog/Document" "ctl:requestBodyAccess=Off"
            # MeTube socket.io polling false positive (920420: request content type policy)
            - SecRule REQUEST_METHOD "@streq POST" "id:100005,phase:1,pass,nolog,chain"
            - SecRule REQUEST_HEADERS:Host "@rx ^metube\." "chain"
            - SecRule REQUEST_FILENAME "@beginsWith /socket.io/" "ctl:ruleRemoveById=920420"
            # Transmute uploads arbitrary user files; do not buffer/inspect upload bodies.
            - SecRule REQUEST_METHOD "@streq POST" "id:100006,phase:1,pass,nolog,chain"
            - SecRule REQUEST_FILENAME "@streq /api/files" "ctl:requestBodyAccess=Off"
            # BookOrbit uploads large book files; do not buffer/inspect upload bodies.
            - SecRule REQUEST_METHOD "@streq POST" "id:100012,phase:1,pass,nolog,chain"
            - SecRule REQUEST_FILENAME "@rx ^/api/v1/libraries/[0-9]+/upload$" "ctl:requestBodyAccess=Off"
            # Grimmory reading progress false positive (941130: XSS attr vector - EPUB CFI paths contain .xhtml)
            - SecRule REQUEST_METHOD "@streq POST" "id:100007,phase:1,pass,nolog,chain"
            - SecRule REQUEST_FILENAME "@streq /api/v1/books/progress" "ctl:ruleRemoveById=941130"
            # BookOrbit reading progress: EPUB CFI in the body trips 932130 (RCE unix shell expr) and 941130 (XSS attr vector)
            - SecRule REQUEST_METHOD "@streq POST" "id:100008,phase:1,pass,nolog,chain"
            - SecRule REQUEST_FILENAME "@beginsWith /api/v1/books/files/" "ctl:ruleRemoveById=932130,ctl:ruleRemoveById=941130"
            # BookOrbit Kobo/KOReader device sync: EPUB positions (.xhtml, CFI/XPointer bracket notation like /docfragment[8]) trip 941130 (XSS attr) and 932130 (RCE unix shell) across the kobo/koreader APIs
            - SecRule REQUEST_METHOD "@rx ^(POST|PUT|PATCH)$" "id:100014,phase:1,pass,nolog,chain"
            - SecRule REQUEST_FILENAME "@rx ^/api/v1/(kobo|koreader)/" "ctl:ruleRemoveById=941130,ctl:ruleRemoveById=932130"
            # BookOrbit File Naming settings: upload path/folder templates contain <>{}|() metacharacters that trip RCE/XSS rules; do not inspect the body
            - SecRule REQUEST_METHOD "@rx ^(POST|PUT|PATCH)$" "id:100015,phase:1,pass,nolog,chain"
            - SecRule REQUEST_FILENAME "@rx ^/api/v1/app-settings/upload-pattern(-folder)?$" "ctl:requestBodyAccess=Off"
            # BookOrbit book metadata match/apply: free-text description/metadata trips SQLi/RCE/XSS rules; do not inspect the body
            - SecRule REQUEST_METHOD "@rx ^(POST|PUT|PATCH)$" "id:100016,phase:1,pass,nolog,chain"
            - SecRule REQUEST_FILENAME "@rx ^/api/v1/book-dock/files/[0-9]+$" "ctl:requestBodyAccess=Off"
            # BookOrbit metadata/locks update: free-text metadata trips 941310 (US-ASCII malformed XSS) and related; do not inspect the body
            - SecRule REQUEST_METHOD "@rx ^(POST|PUT|PATCH)$" "id:100017,phase:1,pass,nolog,chain"
            - SecRule REQUEST_FILENAME "@rx ^/api/v1/books/[0-9]+/metadata-and-locks$" "ctl:requestBodyAccess=Off"
            # BookOrbit search: free-text queries (e.g. unix command names like "fd") trip RCE/SQLi rules; do not inspect the body
            - SecRule REQUEST_METHOD "@streq POST" "id:100018,phase:1,pass,nolog,chain"
            - SecRule REQUEST_FILENAME "@streq /api/v1/books/query" "ctl:requestBodyAccess=Off"
            # Immich Android app sends Content-Type: text/plain, which trips 920420 (content-type policy); allow it for the Immich host
            - SecRule REQUEST_HEADERS:Host "@rx ^photos\." "id:100019,phase:1,pass,nolog,ctl:ruleRemoveById=920420"
            # Grimmory reading sessions false positive (932130: RCE unix shell expr - EPUB CFI bracket notation in endLocation)
            - SecRule REQUEST_METHOD "@streq POST" "id:100009,phase:1,pass,nolog,chain"
            - SecRule REQUEST_FILENAME "@streq /api/v1/reading-sessions" "ctl:ruleRemoveById=932130"
            # ArgoCD webhook: git payloads trip 941130 (XSS attr vector) and 932260 (RCE direct unix command)
            - SecRule REQUEST_METHOD "@streq POST" "id:100010,phase:1,pass,nolog,chain"
            - SecRule REQUEST_FILENAME "@streq /api/webhook" "ctl:ruleRemoveById=941130,ctl:ruleRemoveById=932260"
            # Intro Skipper config save false positive (933160: PHP function call - ChapterAnalyzerRecapPattern regex contains "Prev(ious(ly)?)?")
            - SecRule REQUEST_METHOD "@streq POST" "id:100011,phase:1,pass,nolog,chain"
            - SecRule REQUEST_FILENAME "@streq /Plugins/c83d86bb-a1e0-4c35-a113-e2101cf4ee6b/Configuration" "ctl:ruleRemoveById=933160"
            - Include @crs-setup-conf
            - Include @owasp_crs/*.conf
            # --- Rule Exclusions ---
            # 200002: multipart request-body parse false positives
            - SecRuleRemoveById 200002
            # 200003: multipart strict validation false positives
            - SecRuleRemoveById 200003
            # 911100: Method enforcement - REST APIs need DELETE/PATCH/PUT
            - SecRuleRemoveById 911100
            # 920274: Invalid header chars - Cloudflare cf-visitor and Envoy headers
            - SecRuleRemoveById 920274
            # 920430: HTTP protocol version - Istio/Envoy uses HTTP/2 internally
            - SecRuleRemoveById 920430
            # 930120: LFI - matches legitimate field names like .Profile
            - SecRuleRemoveById 930120
            # 941160: XSS - matches legitimate HTML in forms
            - SecRuleRemoveById 941160
            # Renovate webhook (scoped by path + query args): GitHub PR bodies carry arbitrary code/markdown that trips many RCE/SQLi/XSS/PHP rules; do not inspect the body
            - SecRule REQUEST_FILENAME "@streq /webhook/v1/github" "id:100001,phase:1,pass,nolog,chain"
            - SecRule ARGS:namespace "@streq renovate" "chain"
            - SecRule ARGS:job "@streq renovate-github" "ctl:requestBodyAccess=Off"
