---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: argocd-server-backend-tls
  namespace: argocd
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: argocd-server
      sectionName: https
  validation:
    hostname: argocd.${FQDN_01}
    wellKnownCACertificates: System
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: idm-backend-tls
  namespace: kaniop
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: idm
      sectionName: https
  validation:
    hostname: auth.${FQDN_01}
    wellKnownCACertificates: System
