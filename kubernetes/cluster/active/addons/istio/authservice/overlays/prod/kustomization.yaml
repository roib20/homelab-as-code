---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
configMapGenerator:
  - name: env-vars
    envs:
      - /tmp/env-vars.env
  - name: authservice-hosts
    literals:
      - AUTH_HOST=auth.PLACEHOLDER
      - CYBERCHEF_HOST=cyberchef.PLACEHOLDER
    options:
      disableNameSuffixHash: true
  - name: authservice-urls
    literals:
      - CONFIGURATION_URI=https://auth.PLACEHOLDER/oauth2/openid/cyberchef/.well-known/openid-configuration
      - CALLBACK_URI=https://cyberchef.PLACEHOLDER/callback
    options:
      disableNameSuffixHash: true

  # The Registry of OIDC configurations
  - name: authservice-config-src
    files:
      - config.json=resources/config.json

replacements:
  - path: replacements.yaml
