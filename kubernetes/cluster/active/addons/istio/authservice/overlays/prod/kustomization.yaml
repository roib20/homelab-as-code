---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - resources/authservice-config.yaml
  - resources/cyberchef-kubernetes-secret-store.yaml
  - resources/cyberchef-client-secret.yaml.externalsecret
configMapGenerator:
  - name: env-vars
    envs:
      - /tmp/env-vars.env
  - name: authservice-hosts
    literals:
      - AUTH_HOST=auth.${FQDN_01}
      - CYBERCHEF_HOST=cyberchef.${FQDN_01}
    options:
      disableNameSuffixHash: true
  - name: authservice-urls
    literals:
      - CONFIGURATION_URI=https://auth.${FQDN_01}/oauth2/openid/cyberchef
      - CALLBACK_URI=https://cyberchef.${FQDN_01}/callback
    options:
      disableNameSuffixHash: true
replacements:
  - path: replacements.yaml
