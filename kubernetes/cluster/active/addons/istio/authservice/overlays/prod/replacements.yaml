---
- source:
    kind: ConfigMap
    name: env-vars
    fieldPath: "data.FQDN_01"
  targets:
    - select:
        kind: ConfigMap
        name: authservice-hosts
      fieldPaths:
        - data.AUTH_HOST
        - data.CYBERCHEF_HOST
      options:
        delimiter: "."
        index: 1
    - select:
        kind: ConfigMap
        name: authservice-urls
      fieldPaths:
        - data.CONFIGURATION_URI
      options:
        delimiter: "/"
        index: 2
    - select:
        kind: ConfigMap
        name: authservice-urls
      fieldPaths:
        - data.CALLBACK_URI
      options:
        delimiter: "/"
        index: 2

# Pull the monolithic config from the local file in the overlay
- source:
    kind: ConfigMap
    name: authservice-config-src
    fieldPath: data.config\.json
  targets:
    - select:
        kind: ConfigMap
        name: authservice-config
      fieldPaths:
        - data.config\.json

# Inject the FINAL URLs into the config using double-quote as delimiter.
# This replaces the whole string value at the exact index.
# Index 17: callback_uri value
# Index 35: configuration_uri value
- source:
    kind: ConfigMap
    name: authservice-urls
    fieldPath: "data.CALLBACK_URI"
  targets:
    - select:
        kind: ConfigMap
        name: authservice-config
      fieldPaths:
        - data.config\.json
      options:
        delimiter: '"'
        index: 17

- source:
    kind: ConfigMap
    name: authservice-urls
    fieldPath: "data.CONFIGURATION_URI"
  targets:
    - select:
        kind: ConfigMap
        name: authservice-config
      fieldPaths:
        - data.config\.json
      options:
        delimiter: '"'
        index: 35
