---
# STAGE 1: Build the hostnames (auth.example.com, etc)
- source:
    kind: ConfigMap
    name: env-vars
    fieldPath: "data.FQDN_01"
  targets:
    - select:
        kind: ConfigMap
        name: authservice-hosts
      fieldPaths:
        - data.AUTH_HOST
        - data.CYBERCHEF_HOST
      options:
        delimiter: "."
        index: 1

# STAGE 2: Build the full OIDC URLs
# We target the segment between "https://" and the first "/"
- source:
    kind: ConfigMap
    name: authservice-hosts
    fieldPath: "data.AUTH_HOST"
  targets:
    - select:
        kind: ConfigMap
        name: authservice-urls
      fieldPaths:
        - data.CONFIGURATION_URI
      options:
        delimiter: "/"
        index: 2

- source:
    kind: ConfigMap
    name: authservice-hosts
    fieldPath: "data.CYBERCHEF_HOST"
  targets:
    - select:
        kind: ConfigMap
        name: authservice-urls
      fieldPaths:
        - data.CALLBACK_URI
      options:
        delimiter: "/"
        index: 2

# STAGE 3: Pull the monolithic config registry skeleton
- source:
    kind: ConfigMap
    name: authservice-config-src
    fieldPath: data.config\.json
  targets:
    - select:
        kind: ConfigMap
        name: authservice-config
      fieldPaths:
        - data.config\.json

# STAGE 4: Inject the finalized URLs into the registry JSON
# Index 17: callback_uri value
# Index 35: configuration_uri value
- source:
    kind: ConfigMap
    name: authservice-urls
    fieldPath: "data.CALLBACK_URI"
  targets:
    - select:
        kind: ConfigMap
        name: authservice-config
      fieldPaths:
        - data.config\.json
      options:
        delimiter: '"'
        index: 17

- source:
    kind: ConfigMap
    name: authservice-urls
    fieldPath: "data.CONFIGURATION_URI"
  targets:
    - select:
        kind: ConfigMap
        name: authservice-config
      fieldPaths:
        - data.config\.json
      options:
        delimiter: '"'
        index: 35
