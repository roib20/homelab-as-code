---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
helmCharts:
  - name: base
    repo: oci://gcr.io/istio-release/charts
    version: 1.27.1
    releaseName: istio-base
    namespace: istio-system
    valuesFile: ../../base/values.yaml
    additionalValuesFiles:
      - values-override.yaml
resources:
  - ../../base
