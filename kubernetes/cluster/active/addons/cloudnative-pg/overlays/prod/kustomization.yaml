---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
helmCharts:
  - name: cloudnative-pg
    repo: oci://ghcr.io/cloudnative-pg/charts
    version: 0.28.3
    releaseName: cloudnative-pg
    namespace: cnpg-system
    valuesFile: ../../base/values.yaml
    additionalValuesFiles:
      - values-override.yaml
    includeCRDs: true
