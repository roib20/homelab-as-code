---
apiVersion: kaniop.rs/v1beta1
kind: Kanidm
metadata:
  name: idm
spec:
  domain: "id.${FQDN_01}"
  tlsSecretName: tls-wildcard
  replicaGroups:
    - name: default
      replicas: 3
      primaryNode: true
  logLevel: info
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Mi
