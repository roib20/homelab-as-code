---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - kanidm.yaml
  - kanidm-httproute.yaml
helmCharts:
  - name: kaniop
    repo: oci://ghcr.io/pando85/helm-charts
    version: 0.5.8
    releaseName: kaniop
    namespace: kaniop
    valuesFile: ../../base/values.yaml
    additionalValuesFiles:
      - values-override.yaml
    includeCRDs: true
configMapGenerator:
  - name: env-vars
    envs:
      - /tmp/env-vars.env
  - name: kanidm-ui-override-css
    files:
      - files/override.css
    options:
      disableNameSuffixHash: true
replacements:
  - path: replacements.yaml
