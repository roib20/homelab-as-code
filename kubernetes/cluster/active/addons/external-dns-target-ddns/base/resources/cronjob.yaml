---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: external-dns-target-ddns
  namespace: external-dns
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: external-dns-target-ddns
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: external-dns-target-ddns
              # renovate: datasource=docker depName=alpine/k8s
              image: alpine/k8s:1.35.3
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
              command:
                - /bin/sh
                - -c
                - |
                  set -eu

                  REAL_IP="$(curl -4fsS "https://ipv4.icanhazip.com" | tr -d '\r\n')"
                  printf '%s\n' "${REAL_IP}" | grep -Eq '^([0-9]{1,3}\.){3}[0-9]{1,3}$'

                  EXISTING_IP="$(kubectl --namespace "istio-ingress" \
                    get service "istio-ingressgateway" \
                    -o jsonpath='{.metadata.annotations.external-dns\.alpha\.kubernetes\.io/target}')"

                  if [ "${REAL_IP}" = "${EXISTING_IP}" ]; then
                    echo "No change: ${REAL_IP}"
                    exit 0
                  fi

                  kubectl --namespace "istio-ingress" \
                    annotate service "istio-ingressgateway" \
                    external-dns.alpha.kubernetes.io/target="${REAL_IP}" \
                    --overwrite

                  echo "Updated target: ${EXISTING_IP:-<missing>} -> ${REAL_IP}"
