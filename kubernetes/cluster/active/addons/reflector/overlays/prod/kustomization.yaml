---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
helmCharts:
  - additionalValuesFiles:
      - values-override.yaml
    includeCRDs: true
    name: reflector
    namespace: kube-system
    releaseName: reflector
    repo: https://emberstack.github.io/helm-charts
    valuesFile: ../../base/values.yaml
    version: 9.1.31
