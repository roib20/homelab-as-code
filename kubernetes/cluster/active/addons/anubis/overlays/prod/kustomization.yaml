---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
# Secret managed by external-secrets-operator
helmCharts:
  - name: app-template
    repo: oci://ghcr.io/bjw-s-labs/helm
    version: 4.2.0
    releaseName: anubis
    namespace: anubis
    valuesFile: ../../base/values.yaml
    additionalValuesFiles:
      - values-override.yaml
