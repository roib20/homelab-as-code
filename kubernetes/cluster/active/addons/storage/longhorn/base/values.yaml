---
defaultSettings:
  defaultDataLocality: best-effort
  defaultDataPath: "/var/mnt/longhorn"
  nodeDrainPolicy: block-for-eviction-if-contains-last-replica
  detachManuallyAttachedVolumesWhenCordoned: true
persistence:
  defaultDataLocality: best-effort
preUpgradeChecker:
  # -- Setting that allows Longhorn to perform pre-upgrade checks. Disable this setting when installing Longhorn using Argo CD or other GitOps solutions.
  jobEnabled: false
image:
  longhorn:
    instanceManager:
      repository: longhornio/longhorn-instance-manager
      tag: v1.11.0-hotfix-1
metrics:
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack
