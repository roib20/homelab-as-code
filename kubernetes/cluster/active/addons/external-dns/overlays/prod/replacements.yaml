---
- source:
    kind: ConfigMap
    name: env-vars
    fieldPath: data.FQDN_01
  targets:
    - select:
        kind: Deployment
        name: external-dns
      fieldPaths:
        - spec.template.spec.containers.[name=external-dns].args.[=^--domain-filter=\$\{FQDN_01\}$]
      options:
        delimiter: "="
        index: 1
