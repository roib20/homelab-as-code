---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
helmCharts:
  - additionalValuesFiles:
      - values-override.yaml
    includeCRDs: true
    name: reloader
    namespace: kube-system
    releaseName: reloader
    repo: oci://ghcr.io/stakater/charts
    valuesFile: ../../base/values.yaml
    version: 2.2.2
