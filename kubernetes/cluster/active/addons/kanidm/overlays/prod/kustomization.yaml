---
{
  apiVersion: "kustomize.config.k8s.io/v1beta1",
  kind: "Kustomization",
  resources: [
    "../../base",
  ],
  helmCharts: [{
    name: "app-template",
    repo: "oci://ghcr.io/bjw-s-labs/helm",
    version: "4.1.2",
    releaseName: "kanidm",
    namespace: "kanidm",
    valuesFile: "../../base/values.yaml",
    additionalValuesFiles: [
      "values.yaml",
    ],
  }],
  configMapGenerator: [{
    name: "env-vars",
    envs: [
      "/tmp/env-vars.env",
    ],
  }],
  replacements: [{
    path: "../../base/replacements.yaml",
  }],
}
