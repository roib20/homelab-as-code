---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
helmCharts:
  - additionalValuesFiles:
      - values-override.yaml
    includeCRDs: true
    name: longhorn
    namespace: longhorn-system
    releaseName: longhorn
    repo: https://charts.longhorn.io
    valuesFile: ../../base/values.yaml
    version: 1.9.1
patches:
  - target:
      kind: StorageClass
      name: longhorn
    patch: "- op: add\n  path: /metadata/annotations/storageclass.kubernetes.io~1is-default-class\n\
      \  value: \"true\""
