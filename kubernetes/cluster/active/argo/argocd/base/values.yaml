---
dex:
  enabled: false
# HA mode
redis-ha:
  enabled: true
controller:
  replicas: 1
  podAnnotations:
    configmap.reloader.stakater.com/reload: "argocd-cm,argocd-cmd-params-cm,argocd-rbac-cm,argocd-tls-certs-cm"
    secret.reloader.stakater.com/reload: "argocd-secret"
server:
  replicas: 2
  podAnnotations:
    configmap.reloader.stakater.com/reload: "argocd-cm,argocd-cmd-params-cm,argocd-rbac-cm,argocd-tls-certs-cm"
    secret.reloader.stakater.com/reload: "argocd-secret,argocd-server-tls"
applicationSet:
  replicas: 2
  podAnnotations:
    configmap.reloader.stakater.com/reload: "argocd-cm,argocd-cmd-params-cm"
    secret.reloader.stakater.com/reload: "argocd-secret"
notifications:
  podAnnotations:
    configmap.reloader.stakater.com/reload: "argocd-cm,argocd-cmd-params-cm,argocd-notifications-cm"
    secret.reloader.stakater.com/reload: "argocd-notifications-secret,argocd-secret"
repoServer:
  replicas: 2
  # Restart on secrets change
  podAnnotations:
    configmap.reloader.stakater.com/reload: "argocd-cm,argocd-cmd-params-cm,argocd-gpg-keys-cm,argocd-ssh-known-hosts-cm,argocd-tls-certs-cm"
    secret.reloader.stakater.com/reload: "argocd-secret,argocd-secret-merge,env-vars,git-credentials"
  # Mount env-vars
  envFrom:
    - secretRef:
        name: env-vars
  lifecycle:
    postStart:
      exec:
        command:
          - /bin/sh
          - -c
          - |
            mkdir -p /tmp
            # grab only env_ vars, strip the prefix, write key=value lines
            printenv | grep '^env_' | sed 's/^env_//' > /tmp/env-vars.env
configs:
  # argocd-cm
  cm:
    # Kustomize build options
    kustomize.buildOptions: "--enable-helm --load-restrictor=LoadRestrictionsNone"
    # Troubleshooting Cilium deployed with Argo CD: https://docs.cilium.io/en/latest/configuration/argocd-issues/
    # Ignore some Istio differences
    ignoreDifferences:
      - group: ""
        kind: ConfigMap
        name: hubble-ca-cert
        jsonPointers:
          - /data/ca.crt
      - group: ""
        kind: Secret
        name: hubble-relay-client-certs
        jsonPointers:
          - /data/ca.crt
          - /data/tls.crt
          - /data/tls.key
      - group: ""
        kind: Secret
        name: hubble-server-certs
        jsonPointers:
          - /data/ca.crt
          - /data/tls.crt
          - /data/tls.key
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        name: istio-validator-istio-system
        jsonPointers:
          - /webhooks/0/failurePolicy
          - /webhooks/1/failurePolicy
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        name: istiod-default-validator
        jsonPointers:
          - /webhooks/0/failurePolicy
          - /webhooks/1/failurePolicy
    # Ignore Health for Ingress resources that lack an ADDRESS value
    resource.customizations: |
      networking.k8s.io/Ingress:
        health.lua: |
          hs = {}
          hs.status = "Healthy"
          return hs
