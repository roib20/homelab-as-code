---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
helmCharts:
  - additionalValuesFiles:
      - values-override.yaml
    includeCRDs: true
    name: argo-cd
    namespace: argocd
    releaseName: argocd
    repo: oci://ghcr.io/argoproj/argo-helm
    valuesFile: ../../base/values.yaml
    version: 8.1.1
