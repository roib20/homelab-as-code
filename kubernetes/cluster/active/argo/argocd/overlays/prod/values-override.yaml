---
controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack

server:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
  # Ingress
  ingress:
    enabled: true
    ingressClassName: tailscale
    annotations:
      tailscale.com/proxy-group: ingress-proxies
      gethomepage.dev/enabled: "true"
      gethomepage.dev/description: Declarative, GitOps continuous delivery tool for Kubernetes.
      gethomepage.dev/group: Operations
      gethomepage.dev/icon: argo-cd.svg
      gethomepage.dev/name: Argo CD
      gethomepage.dev/widget.type: "argocd"
      gethomepage.dev/widget.url: "https://argocd-server.argocd.svc.cluster.local"
      gethomepage.dev/widget.key: "{{`{{HOMEPAGE_VAR_ARGOCD_KEY}}`}}"
    extraTls:
      - hosts:
          - "argocd.${FQDN_02}"
  ingressGrpc:
    enabled: true
    ingressClassName: tailscale
    annotations:
      tailscale.com/proxy-group: ingress-proxies
    extraTls:
      - hosts:
          - "argocd-grpc.${FQDN_02}"

applicationSet:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack

repoServer:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
# API Key for Homepage widget: https://gethomepage.dev/widgets/services/argocd/
configs:
  cm:
    accounts.readonly: apiKey
  rbac:
    policy.csv: "g, readonly, role:readonly"
