---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-kubernetes-secret-store
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["argocd-kanidm-oauth2-credentials"]
    verbs: ["get"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectrulesreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-kubernetes-secret-store
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-kubernetes-secret-store
subjects:
  - kind: ServiceAccount
    name: argocd-kubernetes-secret-store
    namespace: argocd
