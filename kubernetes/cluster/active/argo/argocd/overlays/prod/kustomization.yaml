---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - argocd-server-webhook-httproute.yaml
  - git-webhook.yaml.externalsecret
helmCharts:
  - additionalValuesFiles:
      - values-override.yaml
    includeCRDs: true
    name: argo-cd
    namespace: argocd
    releaseName: argocd
    repo: oci://ghcr.io/argoproj/argo-helm
    valuesFile: ../../base/values.yaml
    version: 8.1.1
configMapGenerator:
  - name: env-vars
    envs:
      - /tmp/env-vars.env
replacements:
  - path: replacements.yaml
