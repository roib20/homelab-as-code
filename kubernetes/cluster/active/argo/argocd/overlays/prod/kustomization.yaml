---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - external-secrets
  - resources
helmCharts:
  - name: argo-cd
    repo: oci://ghcr.io/argoproj/argo-helm
    version: 9.5.2
    releaseName: argocd
    namespace: argocd
    valuesFile: ../../base/values.yaml
    additionalValuesFiles:
      - values-override.yaml
    includeCRDs: true
configMapGenerator:
  - name: env-vars-argocd
    envs:
      - /tmp/env-vars.env
    literals:
      - AUTH_HOST=auth.${FQDN_01}
replacements:
  - path: replacements.yaml
