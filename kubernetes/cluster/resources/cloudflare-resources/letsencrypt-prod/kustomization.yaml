---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cloudflare-operator-system
resources:
  - ../base
  - resources/certificates/tls-wildcard.yaml
  - resources/cloudflare-operator_custom-resources/cluster-tunnel.yaml
  - resources/cloudflare-operator_custom-resources/tunnel-bindings.yaml
configMapGenerator:
  - name: env-vars
    envs:
      - /tmp/env-vars.env
replacements:
  - path: ../base/replacements.yaml
