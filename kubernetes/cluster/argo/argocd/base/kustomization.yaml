apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
- namespace.yaml
- github.com/argoproj/argo-cd//manifests/ha/cluster-install?ref=v3.0.6

configMapGenerator:
  - name: argocd-cm
    behavior: merge
    literals:
      - kustomize.buildOptions="--enable-helm --load-restrictor=LoadRestrictionsNone"

