# HA mode with autoscaling
redis-ha:
  enabled: true

controller:
  replicas: 1

server:
  autoscaling:
    enabled: true
    minReplicas: 2
# Ingress
  ingress:
    enabled: true
    ingressClassName: tailscale
    extraTls:
      - hosts:
        - argocd

  ingressGrpc:
    enabled: true
    ingressClassName: tailscale
    extraTls:
      - hosts:
        - argocd-grpc

applicationSet:
  replicas: 2

repoServer:
  autoscaling:
    enabled: true
    minReplicas: 2

  # Mount env-vars
  envFrom:
    - secretRef:
        name: env-vars

  lifecycle:
    postStart:
      exec:
        command:
          - /bin/sh
          - -c
          - |
            mkdir -p /tmp
            # grab only env_ vars, strip the prefix, write key=value lines
            printenv | grep '^env_' | sed 's/^env_//' > /tmp/env-vars.env

configs:
# argocd-cm
  cm:
    # Kustomize build options
    kustomize.buildOptions: "--enable-helm --load-restrictor=LoadRestrictionsNone"

    # Troubleshooting Cilium deployed with Argo CD: https://docs.cilium.io/en/latest/configuration/argocd-issues/
    ignoreDifferences: |-
      - group: ""
        kind: ConfigMap
        name: hubble-ca-cert
        jsonPointers:
          - /data/ca.crt
      - group: ""
        kind: Secret
        name: hubble-relay-client-certs
        jsonPointers:
          - /data/ca.crt
          - /data/tls.crt
          - /data/tls.key
      - group: ""
        kind: Secret
        name: hubble-server-certs
        jsonPointers:
          - /data/ca.crt
          - /data/tls.crt
          - /data/tls.key
