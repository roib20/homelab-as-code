apiVersion: cache.cs.sap.com/v1alpha1
kind: Valkey
metadata:
  name: anubis
spec:
  replicas: 3                 # 3 × pods → 3 × sentinels
  sentinel:
    enabled: true             # automatic fail-over
  persistence:                # keep it *ephemeral* → no PVCs
    enabled: false            # AOF/RDB disabled (pure RAM)
  metrics:
    enabled: true             # optional Prom metrics on :9121
  tls:
    enabled: false            # enable if you need in-cluster TLS
