apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

helmCharts:
  - name: cert-manager
    repo: oci://quay.io/jetstack/charts
    version: v1.18.2
    releaseName: cert-manager
    namespace: cert-manager
    valuesFile: ../../base/values.yaml
    additionalValuesFiles:
      - values.yaml
    includeCRDs: true
