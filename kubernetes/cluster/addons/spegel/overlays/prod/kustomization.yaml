---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
helmCharts:
  - name: spegel
    repo: oci://ghcr.io/spegel-org/helm-charts
    version: 0.3.0
    releaseName: spegel
    namespace: kube-system
    includeCRDs: true
    valuesFile: ../../base/values.yaml
    additionalValuesFiles:
      - values.yaml
