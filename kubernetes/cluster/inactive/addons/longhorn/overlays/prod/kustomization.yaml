---
{
  apiVersion: "kustomize.config.k8s.io/v1beta1",
  kind: "Kustomization",
  resources: [
    "../../base",
  ],
  helmCharts: [{
    name: "longhorn",
    repo: "https://charts.longhorn.io",
    version: "1.9.0",
    releaseName: "longhorn",
    namespace: "longhorn-system",
    includeCRDs: true,
    valuesFile: "../../base/values.yaml",
    additionalValuesFiles: [
      "values.yaml",
    ],
  }],
  patches: [{
    target: {
      kind: "StorageClass",
      name: "longhorn",
    },
    patch: "\
       - op: add\n\
      \  path: /metadata/annotations/storageclass.kubernetes.io~1is-default-class\n\
      \  value: \"true\"\
      ",
  }],
}
