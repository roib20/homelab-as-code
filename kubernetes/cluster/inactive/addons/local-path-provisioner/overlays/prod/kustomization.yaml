---
{
  apiVersion: "kustomize.config.k8s.io/v1beta1",
  kind: "Kustomization",
  resources: [
    "../../base",
  ],
  patches: [{
    patch: "\
       apiVersion: storage.k8s.io/v1\n\
       kind: StorageClass\n\
       metadata:\n\
      \  name: local-path\n\
      \  annotations:\n\
      \    storageclass.kubernetes.io/is-default-class: \"true\"\
      ",
  }],
}
