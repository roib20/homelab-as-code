---
{
  # https://www.talos.dev/v1.9/kubernetes-guides/configuration/local-storage/#local-path-provisioner
  apiVersion: "kustomize.config.k8s.io/v1beta1",
  kind: "Kustomization",
  resources: [
    # - https://raw.githubusercontent.com/rancher/local-path-provisioner/v0.0.31/deploy/local-path-storage.yaml
    "https://github.com/rancher/local-path-provisioner//deploy?ref=v0.0.31",
  ],
  patches: [{
    patch: "\
       kind: ConfigMap\n\
       apiVersion: v1\n\
       metadata:\n\
      \  name: local-path-config\n\
      \  namespace: local-path-storage\n\
       data:\n\
      \  config.json: |-\n\
      \    {\n\
      \            \"nodePathMap\":[\n\
      \            {\n\
      \                    \"node\":\"DEFAULT_PATH_FOR_NON_LISTED_NODES\",\n\
      \                    \"paths\":[\"/var/local-path-provisioner\"]\n\
      \            }\n\
      \            ]\n\
      \    }\
      ",
  }, {
    patch: "\
       apiVersion: storage.k8s.io/v1\n\
       kind: StorageClass\n\
       metadata:\n\
      \  name: local-path\n\
      \  annotations:\n\
      \    storageclass.kubernetes.io/is-default-class: \"true\"\
      ",
  }, {
    patch: "\
       apiVersion: v1\n\
       kind: Namespace\n\
       metadata:\n\
      \  name: local-path-storage\n\
      \  labels:\n\
      \    pod-security.kubernetes.io/enforce: privileged\
      ",
  }],
}
