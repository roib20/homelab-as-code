---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: zeroclaw
resources:
  - ../../base
  - external-secrets
  - resources/ingress.yaml
helmCharts:
  - name: app-template
    repo: oci://ghcr.io/bjw-s-labs/helm
    version: 5.0.1
    releaseName: zeroclaw
    namespace: zeroclaw
    valuesFile: ../../base/values.yaml
    additionalValuesFiles:
      - values-override.yaml
    includeCRDs: true
configMapGenerator:
  - name: env-vars
    envs:
      - /tmp/env-vars.env
  - name: zeroclaw-config
    behavior: replace
    files:
      - config.toml=files/config.toml
    options:
      disableNameSuffixHash: true
replacements:
  - path: replacements.yaml
