---
defaultPodOptions:
  annotations:
    secret.reloader.stakater.com/reload: immich-database-app

controllers:
  main:
    containers:
      main:
        env: &immichCommonEnv
          REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
          IMMICH_MACHINE_LEARNING_URL: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'
          DB_URL:
            valueFrom:
              secretKeyRef:
                name: immich-database-app
                key: uri
          DB_VECTOR_EXTENSION: vectorchord
          IMMICH_ALLOW_SETUP: false

server:
  enabled: true
  controllers:
    main:
      containers:
        main:
          env:
            IMMICH_WORKERS_INCLUDE: api
    microservices:
      type: deployment
      pod:
        resourceClaims: &gpuPodClaims
          - name: gpu
            resourceClaimTemplateName: immich-gpu-claim
      containers:
        main:
          env:
            <<: *immichCommonEnv
            IMMICH_WORKERS_EXCLUDE: api
          resources:
            claims: &gpuContainerClaims
              - name: gpu
  rawResources:
    http-route:
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      forceRename: immich
      spec:
        spec:
          parentRefs:
            - group: gateway.networking.k8s.io
              kind: Gateway
              name: http-gateway-api
              namespace: istio-ingress
          hostnames:
            - "photos.${FQDN_01}"
          rules:
            - matches:
                - path:
                    type: Exact
                    value: /.well-known/immich
              backendRefs:
                - group: ""
                  kind: Service
                  name: immich-server
                  namespace: immich
                  port: 2283
                  weight: 1
              timeouts:
                request: 600s
            - matches:
                - path:
                    type: PathPrefix
                    value: /
              backendRefs:
                - group: ""
                  kind: Service
                  name: immich-server
                  namespace: immich
                  port: 2283
                  weight: 1
              timeouts:
                request: 600s
    library-pvc:
      apiVersion: v1
      kind: PersistentVolumeClaim
      forceRename: immich-library
      spec:
        spec:
          accessModes:
            - ReadWriteMany
          storageClassName: longhorn
          resources:
            requests:
              storage: 10Gi
    gpu-claim-template:
      apiVersion: resource.k8s.io/v1
      kind: ResourceClaimTemplate
      forceRename: immich-gpu-claim
      spec:
        spec:
          spec:
            devices:
              requests:
                - name: gpu
                  exactly:
                    deviceClassName: gpu.intel.com
    cnpg-cluster:
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      forceRename: immich-database
      spec:
        spec:
          instances: 2
          storage:
            size: 10Gi
            storageClass: longhorn-cnpg
          imageName: ghcr.io/tensorchord/cloudnative-vectorchord:18.0-0.5.3
          postgresql:
            shared_preload_libraries:
              - vchord.so
          bootstrap:
            initdb:
              database: immich
              owner: immich
          managed:
            services:
              disabledDefaultServices:
                - ro
                - r
          affinity:
            enablePodAntiAffinity: true
            topologyKey: kubernetes.io/hostname
            podAntiAffinityType: required
    cnpg-database:
      apiVersion: postgresql.cnpg.io/v1
      kind: Database
      forceRename: immich-database-immich
      spec:
        spec:
          name: immich
          owner: immich
          cluster:
            name: immich-database
          extensions:
            - name: vector
            - name: cube
            - name: vchord
            - name: earthdistance

immich:
  persistence:
    library:
      existingClaim: immich-library

valkey:
  enabled: true
  persistence:
    data:
      enabled: true
      size: 1Gi
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      storageClass: longhorn

machine-learning:
  enabled: true
  controllers:
    main:
      pod:
        resourceClaims: *gpuPodClaims
      containers:
        main:
          resources:
            claims: *gpuContainerClaims
