---
# renovate: datasource=github-releases depName=immich-app/immich
immichVersion: v2.6.3

controllers:
  main:
    containers:
      main:
        image:
          tag: '{{ .Values.immichVersion }}'
        env:
          - name: REDIS_HOSTNAME
            value: '{{ printf "%s-valkey" .Release.Name }}'
          - name: IMMICH_MACHINE_LEARNING_URL
            value: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'
          - name: DB_HOSTNAME
            valueFrom:
              secretKeyRef:
                name: immich-database-app
                key: host
          - name: DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: immich-database-app
                key: user
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: immich-database-app
                key: password
          - name: DB_DATABASE_NAME
            valueFrom:
              secretKeyRef:
                name: immich-database-app
                key: dbname

server:
  controllers:
    main:
      pod:
        annotations:
          secret.reloader.stakater.com/reload: immich-database-app

immich:
  persistence:
    library:
      existingClaim: immich-library

valkey:
  enabled: true

machine-learning:
  enabled: true
  controllers:
    main:
      containers:
        main:
          image:
            tag: '{{ .Values.immichVersion }}-openvino'
