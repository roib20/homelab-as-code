---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
helmCharts:
  - name: renovate
    repo: oci://ghcr.io/renovatebot/charts
    version: 45.74.3
    releaseName: renovate
    namespace: renovate
    valuesFile: ../../base/values.yaml
    additionalValuesFiles:
      - values-override.yaml
    includeCRDs: true
