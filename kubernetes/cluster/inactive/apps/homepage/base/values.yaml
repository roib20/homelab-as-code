---
forceConfigFromValues: true
configmap:
  config:
    data:
      bookmarks.yaml: |
        ---
      kubernetes.yaml: |
        ---
        # For configuration options and examples, please see:
        # https://gethomepage.dev/configs/kubernetes/

        mode: cluster
        ingress: true # default, enable ingress
        traefik: false # disable traefik ingressRoute
        gateway: true # enable gateway-api
      services.yaml: |
        ---
      settings.yaml: |
        ---
        providers:
          longhorn:
            url: http://longhorn-frontend.longhorn-system.svc.cluster.local
      widgets.yaml: |
        ---
        - resources:
            cpu: true
            memory: true
            disk: /
        - search:
            provider: google # google, duckduckgo, bing, baidu, brave or custom
            focus: false # Optional, will set focus to the search bar on page load
            showSearchSuggestions: true # Optional, will show search suggestions. Defaults to false
            target: _blank # One of _self, _blank, _parent or _top
        - longhorn:
            # Show the expanded
            expanded: true
            # Shows a node representing the aggregate values
            total: true
            # Shows the node names as labels
            labels: true
            # Show the nodes
            nodes: true
