---
- name: Set a hostname (based on inventory alias)
  ansible.builtin.include_role:
    name: hostname
- name: Enable IP forwarding for exit node support
  become: true
  block:
    - name: Enable IPv4 forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        sysctl_file: /etc/sysctl.d/99-tailscale.conf
        state: present
        reload: true
    - name: Enable IPv6 forwarding
      ansible.posix.sysctl:
        name: net.ipv6.conf.all.forwarding
        value: '1'
        sysctl_file: /etc/sysctl.d/99-tailscale.conf
        state: present
        reload: true
- name: Linux optimizations for subnet routers and exit nodes
  become: true
  vars:
    tailscale_netdev: "{{ ansible_default_ipv4.interface }}"
  block:
    - name: Ensure networkd-dispatcher directory exists
      ansible.builtin.file:
        path: "/etc/networkd-dispatcher/routable.d"
        state: directory
        mode: '0755'
    - name: Create persistent ethtool script for networkd-dispatcher
      ansible.builtin.copy:
        dest: "/etc/networkd-dispatcher/routable.d/50-tailscale"
        mode: '0755'
        content: |
          #!/bin/sh
          ethtool -K {{ tailscale_netdev }} rx-udp-gro-forwarding on rx-gro-list off
      notify: Apply tailscale ethtool settings
- name: Install and login into Tailscale
  ansible.builtin.include_role:
    name: artis3n.tailscale.machine
  vars:
    tailscale_authkey: "{{ lookup('env', 'TS_KEY') }}"
    state: latest
    verbose: true
- name: Gather the generated Tailscale facts
  ansible.builtin.setup:
    filter: '^tailscale_'
- name: Render new inventory pointing to Tailscale hostnames
  delegate_to: localhost
  run_once: true
  become_user: "{{ current_user }}"
  vars:
    pve_groups: ["pve"]
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/inventory_tailscale.yml.j2"
    dest: "{{ inventory_to_overwrite }}"
    mode: "0644"
- name: DEBUG — show Tailscale facts per host
  ansible.builtin.debug:
    msg: |
      Host: {{ inventory_hostname }}
      tailscale_node_hostname_full: {{ hostvars[inventory_hostname].tailscale_node_hostname_full | default('MISSING') }}
      tailscale_node_ipv4: {{ hostvars[inventory_hostname].tailscale_node_ipv4 | default('MISSING') }}
      tailscale_node_hostname_short: {{ hostvars[inventory_hostname].tailscale_node_hostname_short | default('MISSING') }}
- name: Refresh inventory in order to use Tailscale hostnames
  ansible.builtin.meta: refresh_inventory
  delegate_to: localhost
  run_once: true
- name: Show Tailscale connection used
  ansible.builtin.debug:
    msg: "Now using {{ ansible_host }} to connect to {{ inventory_hostname }}"
