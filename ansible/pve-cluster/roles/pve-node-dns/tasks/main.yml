---
- name: Ensure DNS strategy is valid
  ansible.builtin.assert:
    that:
      - (pve_node_dns_strategy | default('prepend')) in ['prepend', 'supersede']
    fail_msg: "pve_node_dns_strategy must be 'prepend' or 'supersede'."

- name: Configure DHCP client DNS overrides
  ansible.builtin.blockinfile:
    path: "/etc/dhcp/dhclient.conf"
    create: true
    owner: root
    group: root
    mode: "0644"
    block: |
      {{ pve_node_dns_strategy | default('prepend') }} domain-name-servers {{
        [
          pve_node_dns1 | default('1.1.1.1', true),
          pve_node_dns2 | default('1.0.0.1'),
          pve_node_dns3 | default('', true)
        ]
        | reject('equalto', none)
        | reject('equalto', '')
        | join(', ')
      }};
  become: true
