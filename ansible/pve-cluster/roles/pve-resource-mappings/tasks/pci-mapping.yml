---
# Configure GPU PCI mapping for a single node
# Called from main.yml with pve_node set to the target hostname

- name: Validate GPU mapping variables for {{ pve_node }}
  ansible.builtin.assert:
    that:
      - hostvars[pve_node]['pve_gpu_id'] is defined
      - hostvars[pve_node]['pve_gpu_id'] | length > 0
      - hostvars[pve_node]['pve_gpu_path'] is defined
      - hostvars[pve_node]['pve_gpu_path'] | length > 0
      - hostvars[pve_node]['pve_gpu_iommugroup'] is defined
      - hostvars[pve_node]['pve_gpu_subsystem_id'] is defined
      - hostvars[pve_node]['pve_gpu_subsystem_id'] | length > 0
    fail_msg: >-
      Missing or invalid GPU mapping variables for {{ pve_node }}.
      Required: pve_gpu_id, pve_gpu_path, pve_gpu_iommugroup, pve_gpu_subsystem_id.

- name: Set mapping variables for {{ pve_node }}
  vars:
    _node_vars: "{{ hostvars[pve_node] }}"
    _map_parts:
      - "node={{ pve_node }}"
      - "path={{ _node_vars.pve_gpu_path }}"
      - "id={{ _node_vars.pve_gpu_id }}"
      - "subsystem-id={{ _node_vars.pve_gpu_subsystem_id }}"
      - "iommugroup={{ _node_vars.pve_gpu_iommugroup }}"
  ansible.builtin.set_fact:
    _mapping_id: "GPU_{{ pve_node }}"
    _desired_map: "{{ _map_parts | join(',') }}"
    _desired_mdev: "{{ _node_vars.pve_gpu_mdev | default(0) | int }}"

- name: Get existing PCI mapping for {{ pve_node }}
  ansible.builtin.command:
    cmd: pvesh get /cluster/mapping/pci/{{ _mapping_id }} --output-format json
  register: _existing_mapping
  changed_when: false
  failed_when: false
  become: true
  delegate_to: "{{ pve_node }}"

- name: Set mapping exists flag for {{ pve_node }}
  ansible.builtin.set_fact:
    _mapping_exists: "{{ _existing_mapping.rc == 0 }}"

- name: Parse and compare existing mapping for {{ pve_node }}
  when: _mapping_exists
  block:
    - name: Parse current mapping
      ansible.builtin.set_fact:
        _current_mapping: "{{ _existing_mapping.stdout | from_json }}"

    - name: Extract current map string
      ansible.builtin.set_fact:
        _current_map_raw: "{{ _current_mapping.map | default([]) }}"

    - name: Normalize current map to comparable string
      ansible.builtin.set_fact:
        _current_map: >-
          {%- set raw = _current_map_raw -%}
          {%- if raw is string -%}
            {{ raw }}
          {%- elif raw is sequence and raw | length > 0 -%}
            {%- set first = raw | first -%}
            {%- if first is mapping -%}
              {%- set parts = [] -%}
              {%- for k, v in first.items() -%}
                {%- set _ = parts.append(k ~ '=' ~ v) -%}
              {%- endfor -%}
              {{ parts | sort | join(',') }}
            {%- else -%}
              {{ first }}
            {%- endif -%}
          {%- else -%}
            {{ '' }}
          {%- endif -%}

    - name: Compare current and desired state
      ansible.builtin.set_fact:
        _needs_update: >-
          {{ (_current_map.split(',') | sort | join(',')) != (_desired_map.split(',') | sort | join(','))
             or ((_current_mapping.mdev | default(0) | int) != (_desired_mdev | int)) }}

- name: Create PCI mapping for {{ pve_node }}
  when: not _mapping_exists
  ansible.builtin.command:
    argv:
      - pvesh
      - create
      - /cluster/mapping/pci
      - --id
      - "{{ _mapping_id }}"
      - --map
      - "{{ _desired_map }}"
      - --mdev
      - "{{ _desired_mdev }}"
  changed_when: true
  become: true
  delegate_to: "{{ pve_node }}"

- name: Update PCI mapping for {{ pve_node }}
  when:
    - _mapping_exists
    - _needs_update
  ansible.builtin.command:
    argv:
      - pvesh
      - set
      - /cluster/mapping/pci/{{ _mapping_id }}
      - --map
      - "{{ _desired_map }}"
      - --mdev
      - "{{ _desired_mdev }}"
  changed_when: true
  become: true
  delegate_to: "{{ pve_node }}"
