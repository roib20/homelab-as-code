---
# Configure PCI Resource Mappings for Proxmox VE cluster
# Each node manages its own GPU mapping entry, executed sequentially
# https://pve.proxmox.com/wiki/PCI_Passthrough#Resource_Mapping

- name: Configure PCI resource mappings for each node
  run_once: true
  block:
    - name: Process GPU mapping for {{ item }}
      ansible.builtin.include_tasks: pci-mapping.yml
      loop: "{{ groups['pve'] | sort }}"
      loop_control:
        loop_var: pve_node
