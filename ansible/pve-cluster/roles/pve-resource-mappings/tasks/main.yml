---
# Configure PCI Resource Mappings for Proxmox VE cluster
# Each node manages its own PCI mapping entries, executed sequentially
# https://pve.proxmox.com/wiki/PCI_Passthrough#Resource_Mapping

# Build list of PCI mappings to configure
- name: Build PCI mappings list
  ansible.builtin.set_fact:
    _pci_mappings: >-
      {{
        (pve_gpu_id | default('') | length > 0) | ternary(
          [{
            'name': 'GPU',
            'id': pve_gpu_id,
            'path': pve_gpu_path,
            'iommugroup': pve_gpu_iommugroup,
            'subsystem_id': pve_gpu_subsystem_id,
            'mdev': pve_gpu_mdev | default(0)
          }],
          []
        )
        +
        (pve_lsi_id | default('') | length > 0) | ternary(
          [{
            'name': 'LSI',
            'id': pve_lsi_id,
            'path': pve_lsi_path,
            'iommugroup': pve_lsi_iommugroup,
            'subsystem_id': pve_lsi_subsystem_id,
            'mdev': pve_lsi_mdev | default(0)
          }],
          []
        )
      }}

- name: Configure PCI mappings
  ansible.builtin.include_tasks: configure_mapping.yml
  loop: "{{ _pci_mappings }}"
  loop_control:
    loop_var: pci_device
    label: "{{ pci_device.name }}_{{ inventory_hostname }}"
