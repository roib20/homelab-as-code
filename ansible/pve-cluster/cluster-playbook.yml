---
- name: Bootstrap nodes over LAN, install Tailscale, then swap to overlay
  hosts: pve
  become: true
  gather_facts: true
  tasks:
    - name: Configure Proxmox node DNS
      ansible.builtin.include_role:
        name: pve-node-dns
        apply:
          tags: pve-node-dns
      tags: pve-node-dns
    - name: Configure /etc/network/interfaces
      template:
        src: "{{ interfaces_template }}"
        dest: /etc/network/interfaces
      register: _configure_interfaces
    - ansible.builtin.include_role:
        name: tailscale-bootstrap
        apply:
          tags: tailscale-bootstrap
      vars:
        inventory_to_overwrite: "{{ hostvars[inventory_hostname].inventory_file }}"
        current_user: "{{ lookup('env','USER') }}"
      tags: tailscale-bootstrap
    - name: Create btrfs subvolume for local storage
      ansible.builtin.include_role:
        name: btrfs-subvolume
        apply:
          tags: btrfs-subvolume
      tags: btrfs-subvolume
    - name: Setup PVE cluster
      tags: proxmox
      block:
        - ansible.builtin.include_role:
            name: lae.proxmox
            apply:
              become: true
    - ansible.builtin.include_role:
        name: cert
        apply:
          tags: cert
      tags: cert
      vars:
        renew_before_expiry_days: 7  # renew when the cert expires in N days or less
        force_renew_cert: false
    - name: Create Proxmox users, roles and tokens
      ansible.builtin.include_role:
        name: proxmox-permissions
        apply:
          tags: proxmox-permissions
      tags: proxmox-permissions
    - name: Install other packages
      ansible.builtin.include_role:
        name: install-packages
        apply:
          tags: install-packages
      tags: install-packages
    - name: Disable PVE subscription nag
      ansible.builtin.include_role:
        name: pve-remove-nag
        apply:
          tags: pve-remove-nag
      tags: pve-remove-nag
    - name: Configure PCI resource mappings
      ansible.builtin.include_role:
        name: pve-resource-mappings
        apply:
          tags: pve-resource-mappings
      tags: pve-resource-mappings
