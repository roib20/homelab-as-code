---
# Overrides for Comet Lake nodes (pve-node-01)

# Intel CometLake-S GT2 [UHD Graphics 630] device ID
pve_pci_device_ids:
  - id: "8086:9bc8"

# PCI Resource Mapping configuration
pve_gpu_id: "{{ (pve_pci_device_ids | map(attribute='id') | first) | default(omit) }}"
pve_gpu_subsystem_id: "1462:7d18"
pve_gpu_path: "0000:00:02.0"  # Explicit GPU PCI path for Comet Lake nodes; adjust per host
pve_gpu_iommugroup: 0  # Explicit IOMMU group ID for Comet Lake nodes; adjust per host
pve_gpu_mdev: 0

# Storage HBA configuration
pve_lsi_id: "1000:0087"
pve_lsi_subsystem_id: "1d49:0201"
pve_lsi_path: "0000:01:00.0"
pve_lsi_iommugroup: 2
pve_lsi_mdev: 0

# Network interface configuration
bridge_port: enp2s0

# Swap on ZRAM
zram_generator_config:
  - {state: present, section: zram0, option: zram-size, value: "min(ram / 2, 8192)"}
  - {state: present, section: zram0, option: compression-algorithm, value: "lzo-rle zstd(level=3) (type=idle)"}
