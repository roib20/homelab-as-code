---
pve_group: pve
pve_watchdog: none
# pve_ssl_private_key: "{{ lookup('file', pve_group + '/' + inventory_hostname + '.key') }}"
# pve_ssl_certificate: "{{ lookup('file', pve_group + '/' + inventory_hostname + '.pem') }}"
pve_cluster_enabled: true
pve_cluster_addr0: "{{ hostvars[inventory_hostname].tailscale_node_ipv4 }}"
pve_cluster_addr1: "{{ hostvars[inventory_hostname].tailscale_node_ipv6 }}"
pve_groups:
  - name: ops
    comment: Operations Team
pve_users:
  - name: debian@pam
    email: admin1@lab.local
    firstname: Admin
    lastname: User 1
    groups: ["ops"]
pve_acls:
  - path: /
    roles: ["Administrator"]
    groups: ["ops"]
pve_storages:
  # - name: localdir
  #   type: dir
  #   content: [ "images", "iso", "backup" ]
  #   path: /plop
  - name: local
    type: dir
    content: ["backup", "iso", "snippets", "vztmpl"]
    path: "/var/lib/vz"
  - name: local-btrfs
    type: btrfs
    content: ["backup", "images", "iso", "snippets", "rootdir", "vztmpl"]
    path: "/var/lib/pve/local-btrfs"
pve_ssh_port: 22
interfaces_template: "interfaces-{{ pve_group }}.j2"
pve_remove_subscription_warning: true  # patches the subscription warning messages in proxmox if you are using the community edition
pve_extra_packages: []  # Any extra packages you may want to install, e.g. ngrep
pve_run_system_upgrades: true  # Let role perform system upgrades
pve_run_proxmox_upgrades: true  # Let role perform Proxmox VE upgrades
pve_check_for_kernel_update: true  # Runs a script on the host to check kernel versions
pve_reboot_on_kernel_update: false  # If set to true, will automatically reboot the machine on kernel updates
pve_reboot_on_kernel_update_delay: 60  # Number of seconds to wait before and after a reboot process to proceed with next task in cluster mode
pve_remove_old_kernels: true  # Currently removes kernel from main Debian repository
pve_pcie_passthrough_enabled: true  # Set this to true to enable PCIe passthrough.
pve_iommu_passthrough_mode: true  # Set this to true to allow VMs to bypass the DMA translation. This might increase performance for IOMMU passthrough.
pve_iommu_unsafe_interrupts: false  # Set this to true if your system doesn't support interrupt remapping.
pve_mediated_devices_enabled: true  # Set this to true if your device supports gtv-g and you wish to enable split functionality.
pve_pcie_ovmf_enabled: true  # Set this to true to enable GPU OVMF PCI passthrough.
pve_pci_device_ids: []  # List of pci device ID's (see https://pve.proxmox.com/wiki/Pci_passthrough#GPU_Passthrough).
# GPU passthrough defaults:
# - pve_gpu_path: PCI address of the physical GPU on the Proxmox host.
#     Use `lspci -nn` and copy the full PCI ID in the form "0000:BB:DD.F".
# - pve_gpu_iommugroup: Numeric IOMMU group ID for the GPU.
#     Determine with e.g. `find /sys/kernel/iommu_groups/ -type l | sort`.
# - pve_gpu_mdev: Mediated device flag for GPU sharing.
#     Use 1 to enable mdev for the mapping, or 0 to disable it.
pve_gpu_id: ""  # PCI vendor:device ID for the GPU at pve_gpu_path (e.g. "8086:5912"); override per host
pve_gpu_subsystem_id: ""  # Subsystem vendor:device ID for the GPU at pve_gpu_path (e.g. "1043:8694"); override per host
pve_gpu_path: "0000:00:02.0"  # PCI address of the default GPU on this host (integrated graphics by default)
pve_gpu_iommugroup: 0  # IOMMU group ID for the GPU at pve_gpu_path (adjust per host)
pve_gpu_mdev: 0  # Mediated device flag for GPU at pve_gpu_path (0 = disabled, 1 = enabled)
pve_vfio_blacklist_drivers: []  # List of device drivers to blacklist from the Proxmox host (see https://pve.proxmox.com/wiki/PCI(e)_Passthrough).
pve_pcie_ignore_msrs: false  # Set this to true if passing through to Windows machine to prevent VM crashing.
pve_pcie_report_msrs: true  # Set this to false to prevent dmesg system from logging msrs crash reports.
pve_node_dns1: "1.1.1.1"  # Primary DNS server for dhclient configuration
pve_node_dns2: "1.0.0.1"  # Secondary DNS server for dhclient configuration
pve_node_dns_strategy: "supersede"  # Strategy for DNS override: prepend or supersede
pve_zfs_enabled: false  # Specifies whether or not to install and configure ZFS packages
pve_ceph_enabled: false  # Specifies whether or not to install and configure Ceph packages.
# pve_no_log: true  # Set this to true in production to prevent leaking of storage credentials in run logs. (may be used in other tasks in the future)
