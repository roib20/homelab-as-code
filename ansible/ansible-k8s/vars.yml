---
kustomize_overlays:
  - name: cert-manager
    set: addons
    overlay: prod
    wait: yes
  - name: cert-resources
    set: addons
    overlay: bootstrap
    wait: yes
  - name: external-secrets
    set: addons
    overlay: prod
    wait: yes
  - name: argocd
    set: argo
    overlay: prod
    wait: no

kubernetes_manifests:
  - name: app-of-apps
    file: bootstrap/app-of-apps.yaml
    wait: yes
