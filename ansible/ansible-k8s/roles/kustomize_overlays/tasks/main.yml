---
- name: Check for standalone kustomize
  ansible.builtin.command:
    cmd: command -v kustomize
  register: kustomize_path
  ignore_errors: true
  changed_when: false

- name: Check for kubectl binary
  ansible.builtin.command:
    cmd: command -v kubectl
  register: kubectl_path
  ignore_errors: true
  changed_when: false

- name: Determine kustomize invocation
  ansible.builtin.set_fact:
    kustomizer: >-
      {% if kustomize_path.rc == 0 %}
        {{ kustomize_path.stdout }} build
      {% elif kubectl_path.rc == 0 %}
        {{ kubectl_path.stdout }} kustomize
      {% else %}
        false
      {% endif %}

- name: "Fail if neither `kustomize` nor `kubectl` are available"
  ansible.builtin.fail:
    msg: "Neither standalone `kustomize` nor `kubectl` was found on the PATH."
  when: kustomizer == false

- name: Fail if no overlays defined
  ansible.builtin.fail:
    msg: "No overlay configurations defined. Please set 'kustomize_overlays' variable."
  when: kustomize_overlays | length == 0

- name: Build kustomization overlay for {{ item.name }}
  ansible.builtin.command: >-
    {{ kustomizer }}
    --enable-helm
    --load-restrictor=LoadRestrictionsNone
    {{ base_path }}/kubernetes/cluster/{{ item.set }}/{{ item.name }}/overlays/{{ item.overlay }}
  loop: "{{ kustomize_overlays }}"
  loop_control:
    label: "{{ item.name }} ({{ item.set }}/{{ item.overlay }})"
  register: kustomize_build
  changed_when: false

- name: Apply rendered resources for {{ item.name }} to the cluster
  kubernetes.core.k8s:
    definition: "{{ kustomize_build.results[index].stdout }}"
    state: present
    wait: "{{ item.wait | default(default_wait) }}"
    wait_timeout: "{{ item.wait_timeout | default(default_wait_timeout) }}"
  loop: "{{ kustomize_overlays }}"
  loop_control:
    index_var: index
    label: "{{ item.name }} ({{ item.set }}/{{ item.overlay }})"
